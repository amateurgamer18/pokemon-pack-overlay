<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Pack Opening Overlay</title>
<style>
  /* ============================================================
     OBS BROWSER SOURCE — transparent background, no scrollbars
     Default canvas: 1920x1080. Animation centers itself.
     ============================================================ */
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ---------- Gifter banner (top of screen) ---------- */
  #banner {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-200%);
    background: linear-gradient(135deg, #ffcb05 0%, #f6a800 100%);
    color: #2a3b8f;
    font-weight: 800;
    font-size: 32px;
    padding: 16px 40px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5), 0 0 0 4px #2a3b8f, 0 0 0 8px #ffcb05;
    text-shadow: 2px 2px 0 rgba(255,255,255,.3);
    transition: transform .6s cubic-bezier(.34,1.56,.64,1);
    z-index: 10;
    text-align: center;
    line-height: 1.2;
  }
  #banner.show { transform: translateX(-50%) translateY(0); }
  #banner .sub { font-size: 18px; font-weight: 600; opacity: .85; margin-top: 4px; }

  /* ---------- Pack & Card container ---------- */
  .scene {
    width: 480px;
    height: 680px;
    position: relative;
    perspective: 1600px;
    transform-style: preserve-3d;
  }

  /* ---------- Pack (spins in on entrance) ---------- */
  .pack {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background:
      radial-gradient(circle at 50% 75%, rgba(255,255,255,.12) 0%, transparent 60%),
      linear-gradient(180deg, #d83f3f 0%, #b81e1e 50%, #8b1414 100%);
    box-shadow:
      inset 0 0 40px rgba(0,0,0,.4),
      0 20px 60px rgba(0,0,0,.6);
    overflow: hidden;
    transform-origin: center center;
    transform: rotateY(-720deg) scale(.7);
    transition: transform 1.6s cubic-bezier(.34, 1.1, .58, 1);
  }
  .scene.enter .pack {
    transform: rotateY(0deg) scale(1);
  }
  .pack-foil {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(115deg, transparent 0px, transparent 8px, rgba(255,255,255,.05) 8px, rgba(255,255,255,.05) 16px);
    mix-blend-mode: overlay;
  }
  .pack-logo {
    position: absolute;
    top: 90px;
    left: 0; right: 0;
    text-align: center;
    color: #ffcb05;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -2px;
    text-shadow:
      -3px -3px 0 #2a3b8f, 3px -3px 0 #2a3b8f,
      -3px 3px 0 #2a3b8f, 3px 3px 0 #2a3b8f,
       0 8px 0 #1a2966, 0 12px 24px rgba(0,0,0,.6);
    transform: rotate(-4deg);
    font-family: 'Impact', 'Arial Black', sans-serif;
  }
  .pack-logo .sub {
    display: block;
    margin-top: 8px;
    font-size: 22px;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 2px 2px 0 #2a3b8f;
    transform: rotate(0deg);
  }
  .pokeball {
    position: absolute;
    left: 50%; top: 58%;
    width: 220px; height: 220px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      linear-gradient(180deg, #ee1515 0%, #ee1515 49%, #222 49%, #222 51%, #f0f0f0 51%, #f0f0f0 100%);
    box-shadow:
      inset -10px -10px 30px rgba(0,0,0,.3),
      inset 8px 8px 20px rgba(255,255,255,.2),
      0 6px 20px rgba(0,0,0,.4);
  }
  .pokeball::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 60px; height: 60px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #f0f0f0;
    box-shadow:
      inset -3px -3px 6px rgba(0,0,0,.2),
      0 0 0 8px #222,
      0 0 0 12px #f0f0f0;
  }
  .pack-stripe {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    background:
      linear-gradient(180deg, #ffcb05 0%, #f6a800 100%);
    box-shadow:
      0 4px 0 0 #2a3b8f inset,
      0 -4px 0 0 #2a3b8f inset;
  }
  .pack-stripe.top { top: 50px; }
  .pack-stripe.bot { bottom: 50px; }

  /* Pack cut line at top — animated rip */
  .pack-cut {
    position: absolute;
    top: 24px;
    left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, #fff 0 8px, transparent 8px 16px);
    opacity: 0;
  }

  /* Pack opens: top half EXPLODES off with white fireworks */
  .pack-top, .pack-bot {
    position: absolute;
    left: 0; right: 0;
    overflow: hidden;
    transform-style: preserve-3d;
  }
  .pack-top {
    top: 0;
    height: 30%;
    transform-origin: bottom center;
  }
  .pack-bot {
    bottom: 0;
    height: 70%;
    transform-origin: top center;
  }
  /* Explosion — top blasts upward with rotation, opacity rapidly fades */
  .scene.exploded .pack-top {
    animation: packTopExplode 1.1s cubic-bezier(.2, .8, .4, 1) forwards;
  }
  @keyframes packTopExplode {
    0%   { transform: translateY(0) rotate(0deg) scale(1);    opacity: 1; }
    20%  { transform: translateY(-30px) rotate(-3deg) scale(1.06); opacity: 1; }
    50%  { transform: translateY(-280px) rotate(15deg) scale(.85); opacity: .9; }
    100% { transform: translateY(-700px) rotate(45deg) scale(.55); opacity: 0; }
  }
  /* Pack bottom recoils slightly and fades a touch */
  .scene.exploded .pack-bot {
    animation: packBotRecoil 1.1s cubic-bezier(.34, 1.4, .64, 1) forwards;
  }
  @keyframes packBotRecoil {
    0%   { transform: translateY(0)    rotate(0deg); }
    15%  { transform: translateY(18px) rotate(.5deg); }
    100% { transform: translateY(10px) rotate(0deg); opacity: .85; }
  }

  /* Explosion sparks — burst outward from the rip line */
  .pack-burst {
    position: absolute;
    top: 30%;
    left: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
    z-index: 6;
  }
  .pack-burst .spark {
    position: absolute;
    left: 0; top: 0;
    width: 14px; height: 14px;
    background: radial-gradient(circle, white 0%, #fff8c8 35%, rgba(255,220,120,.6) 60%, transparent 80%);
    border-radius: 50%;
    opacity: 0;
    box-shadow: 0 0 16px white, 0 0 32px rgba(255,240,180,.7);
  }
  .scene.exploded .pack-burst .spark {
    animation: sparkFly 1.1s cubic-bezier(.2, .7, .4, 1) forwards;
  }
  @keyframes sparkFly {
    0%   { transform: translate(-50%, -50%) scale(0);                opacity: 1; }
    20%  { transform: translate(calc(-50% + var(--dx) * .25), calc(-50% + var(--dy) * .25)) scale(1.4); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.3); opacity: 0; }
  }
  /* For shiny pulls — sparks gain a rainbow tint */
  .scene.shiny-pull .pack-burst .spark {
    background: radial-gradient(circle, white 0%, #ffe4ff 30%, rgba(255,170,255,.7) 60%, transparent 80%);
    box-shadow: 0 0 16px #fff, 0 0 36px rgba(255, 0, 255, .7);
  }

  /* ---------- Card (flat, no 3D flipping — front stays hidden via opacity) ---------- */
  .card {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 380px;
    height: 530px;
    transform: translate(-50%, -50%) translateY(120px) scale(.85);
    opacity: 0;
    transition: opacity .4s ease-out, transform 1.2s cubic-bezier(.34,1.56,.64,1);
    border-radius: 18px;
    will-change: transform;
  }
  .scene.opened .card {
    opacity: 1;
    transform: translate(-50%, -50%) translateY(-30px) scale(1);
  }

  /* Charging — slow breathing pulse */
  .scene.charging .card {
    animation: cardBreathe 1.4s ease-in-out infinite;
  }
  @keyframes cardBreathe {
    0%, 100% { transform: translate(-50%, -50%) translateY(-30px) scale(1);    }
    50%      { transform: translate(-50%, -50%) translateY(-30px) scale(1.06); }
  }

  /* Vibrating — fast nervous shake */
  .scene.vibrating .card {
    animation: cardShake .055s linear infinite;
  }
  @keyframes cardShake {
    0%   { transform: translate(-50%, -50%) translateY(-30px) translate(-4px,-2px) scale(1.06); }
    25%  { transform: translate(-50%, -50%) translateY(-30px) translate(3px,2px)   scale(1.06); }
    50%  { transform: translate(-50%, -50%) translateY(-30px) translate(-2px,3px)  scale(1.06); }
    75%  { transform: translate(-50%, -50%) translateY(-30px) translate(4px,-3px)  scale(1.06); }
    100% { transform: translate(-50%, -50%) translateY(-30px) translate(0,0)       scale(1.06); }
  }

  /* Reveal — dramatic scale bounce (cross-fade handled on .card-back/.card-front) */
  .scene.revealed .card {
    animation: cardRevealBounce .85s cubic-bezier(.34,1.6,.64,1) forwards;
  }
  @keyframes cardRevealBounce {
    0%   { transform: translate(-50%, -50%) translateY(-30px) scale(1.06); }
    35%  { transform: translate(-50%, -50%) translateY(-80px) scale(1.28); }
    100% { transform: translate(-50%, -50%) translateY(-40px) scale(1.12); }
  }

  /* Subtle float during the reveal hold phase */
  .scene.revealed.settled .card {
    animation: cardFloat 3s ease-in-out infinite;
  }
  @keyframes cardFloat {
    0%, 100% { transform: translate(-50%, -50%) translateY(-40px) scale(1.12); }
    50%      { transform: translate(-50%, -50%) translateY(-55px) scale(1.12); }
  }
  /* Shinies float + sway + breathe — adds "alive" feel without changing the sprite */
  .scene.shiny-pull.revealed.settled .card {
    animation: cardFloatShiny 4.5s ease-in-out infinite;
  }
  @keyframes cardFloatShiny {
    0%, 100% { transform: translate(-50%, -50%) translateY(-40px) scale(1.12) rotate(-1.8deg); }
    25%      { transform: translate(-50%, -50%) translateY(-50px) scale(1.135) rotate(0deg); }
    50%      { transform: translate(-50%, -50%) translateY(-58px) scale(1.12) rotate(1.8deg); }
    75%      { transform: translate(-50%, -50%) translateY(-50px) scale(1.135) rotate(0deg); }
  }
  /* Legendaries float bigger, rotate slower, larger scale — feels heavier and more "important" */
  .scene.legendary-pull.revealed.settled .card {
    animation: cardFloatLegendary 5.5s ease-in-out infinite !important;
  }
  @keyframes cardFloatLegendary {
    0%, 100% { transform: translate(-50%, -50%) translateY(-50px) scale(1.16) rotate(-2.5deg); }
    25%      { transform: translate(-50%, -50%) translateY(-62px) scale(1.18)  rotate(0deg); }
    50%      { transform: translate(-50%, -50%) translateY(-70px) scale(1.16) rotate(2.5deg); }
    75%      { transform: translate(-50%, -50%) translateY(-62px) scale(1.18)  rotate(0deg); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    overflow: hidden;
    transition: opacity .45s ease-out, transform .55s cubic-bezier(.34,1.6,.64,1);
  }
  /* Back is visible by default; front is hidden until reveal (NO peek possible) */
  .card-back  { opacity: 1; transform: scale(1); }
  .card-front { opacity: 0; transform: scale(.85); }

  /* At reveal: back disintegrates outward, front materialises inward */
  .scene.revealed .card-back  { opacity: 0; transform: scale(1.45); }
  .scene.revealed .card-front { opacity: 1; transform: scale(1); transition-delay: .18s; }

  /* ============================================================
     Card back — CSS recreation of the classic Pokémon TCG back
     (blue swirl + Pokéball + top & bottom mirrored POKÉMON logo).
     If config.cardBackImageUrl is set, the JS swaps this for a
     plain <img> instead.
     ============================================================ */
  .card-back {
    background:
      /* central highlight that makes the swirl look glossy */
      radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255,255,255,.15) 0%, transparent 60%),
      /* the swirl: concentric tinted bands */
      conic-gradient(from 30deg at 50% 50%,
        #2a4fa8 0deg, #4a78d8 45deg, #2a4fa8 90deg, #5887e8 135deg,
        #2a4fa8 180deg, #4a78d8 225deg, #2a4fa8 270deg, #5887e8 315deg, #2a4fa8 360deg),
      radial-gradient(circle at 50% 50%, #4a78d8 0%, #2a4fa8 60%, #15296e 100%);
    background-blend-mode: overlay, screen, normal;
    border: 14px solid #1a2966;
    box-shadow: 0 0 0 3px #ffcb05 inset, 0 20px 40px rgba(0,0,0,.5);
    overflow: hidden;
    /* position is inherited from .card-face (absolute + inset:0) so the
       card-back fills the full 380x530 card frame */
  }
  /* swirly cloud texture overlay using diagonal repeating gradient */
  .card-back::before {
    content: '';
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(ellipse 60% 40% at 30% 40%, rgba(255,255,255,.18) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 70% 60%, rgba(255,255,255,.18) 0%, transparent 50%),
      radial-gradient(ellipse 50% 30% at 20% 75%, rgba(255,255,255,.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 25%, rgba(255,255,255,.12) 0%, transparent 60%);
    pointer-events: none;
  }
  /* The big yellow POKÉMON wordmark at top */
  .card-back .logo-top,
  .card-back .logo-bot {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    color: #ffd000;
    text-shadow:
      -3px -3px 0 #2a3b8f, 3px -3px 0 #2a3b8f,
      -3px 3px 0 #2a3b8f, 3px 3px 0 #2a3b8f,
       0 6px 0 #1a2966, 0 8px 12px rgba(0,0,0,.5);
    transform: skewX(-8deg);
    z-index: 2;
  }
  .card-back .logo-top { top: 30px; }
  .card-back .logo-bot {
    bottom: 30px;
    transform: skewX(-8deg) rotate(180deg);
  }
  /* The Pokéball in the centre */
  .card-back .pokeball-back {
    position: absolute;
    left: 50%; top: 50%;
    width: 180px; height: 180px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      linear-gradient(180deg, #ee1515 0%, #ee1515 49%, #222 49%, #222 51%, #f4f4f4 51%, #f4f4f4 100%);
    box-shadow:
      inset -14px -14px 36px rgba(0,0,0,.45),
      inset 10px 10px 24px rgba(255,255,255,.35),
      0 6px 20px rgba(0,0,0,.5),
      0 0 0 4px #1a2966;
  }
  .card-back .pokeball-back::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 50px; height: 50px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #fafafa;
    box-shadow:
      inset -3px -3px 6px rgba(0,0,0,.2),
      0 0 0 7px #222,
      0 0 0 10px #fafafa;
  }
  /* If a custom image URL was supplied via config */
  .card-back.has-image {
    background: none;
    border: none;
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
  }
  .card-back.has-image::before,
  .card-back.has-image .logo-top,
  .card-back.has-image .logo-bot,
  .card-back.has-image .pokeball-back { display: none; }
  .card-back.has-image .back-image {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 6px;
  }

  /* Card front (TCG-styled) */
  .card-front {
    --type-bg: #A8A878;
    --type-border: #6D6D4E;
    --type-text: #fff;
    background: linear-gradient(180deg, #fff8d5 0%, #fde9a1 100%);
    border: 14px solid #ffcb05;
    box-shadow:
      0 0 0 3px #c79500 inset,
      0 20px 40px rgba(0,0,0,.5);
    padding: 14px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }
  .card-front .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    color: #1a1a1a;
    margin-bottom: 6px;
    padding: 0 4px;
  }
  .card-front .name {
    font-size: 26px;
    font-weight: 900;
    text-shadow: 2px 2px 0 #fff;
    letter-spacing: -.5px;
  }
  .card-front .hp {
    font-size: 22px;
    font-weight: 800;
    color: #c00;
    text-shadow: 1px 1px 0 #fff;
  }
  .card-front .hp .num { font-size: 28px; }

  .card-front .art {
    flex: 1;
    background: linear-gradient(180deg, #a8d8f8 0%, #6890f0 60%, #4a78d0 100%);
    border: 6px solid var(--type-border);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-front .art img {
    width: 92%;
    height: 92%;
    object-fit: contain;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,.4));
  }
  .card-front .art .type-badge {
    position: absolute;
    top: 8px; right: 8px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--type-bg);
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--type-text);
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
  }

  .card-front .footer {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(0,0,0,.06);
    border-radius: 4px;
    color: #333;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-front .footer .dex { font-weight: 700; }
  .card-front .footer .rarity {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .card-front .rarity .star {
    color: #ffcb05;
    text-shadow: 1px 1px 0 #c79500;
    font-size: 16px;
  }

  /* Holo shimmer overlay (always present on standard cards, subtle) */
  .card-front::before {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 6px;
    background: linear-gradient(115deg,
      transparent 30%,
      rgba(255,255,255,.4) 50%,
      transparent 70%);
    background-size: 200% 200%;
    background-position: -100% -100%;
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity .4s;
  }
  .scene.revealed .card-front::before {
    opacity: 1;
    animation: shimmer 2.2s ease-in-out;
  }
  @keyframes shimmer {
    0%   { background-position: -100% -100%; opacity: 0; }
    50%  { opacity: 1; }
    100% { background-position: 200% 200%; opacity: 0; }
  }

  /* SHINY variant — rainbow holo full overlay + name color shift + RGB border */
  .card-front.shiny {
    background: linear-gradient(180deg, #fff 0%, #f0f0ff 100%);
    animation: rgbBorder 3.5s linear infinite;
  }
  @keyframes rgbBorder {
    0%   {
      border-color: #ff00ff;
      box-shadow: 0 0 0 3px #ff00ff inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,0,255,.6);
    }
    20%  {
      border-color: #ffaa00;
      box-shadow: 0 0 0 3px #ffaa00 inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,170,0,.6);
    }
    40%  {
      border-color: #ffff00;
      box-shadow: 0 0 0 3px #ffff00 inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,255,0,.55);
    }
    60%  {
      border-color: #00ff88;
      box-shadow: 0 0 0 3px #00ff88 inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(0,255,136,.55);
    }
    80%  {
      border-color: #00ddff;
      box-shadow: 0 0 0 3px #00ddff inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(0,221,255,.6);
    }
    100% {
      border-color: #ff00ff;
      box-shadow: 0 0 0 3px #ff00ff inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,0,255,.6);
    }
  }
  .card-front.shiny::after {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 6px;
    background: conic-gradient(
      from 0deg,
      #ff00ff, #ff8800, #ffff00, #00ff88, #00ffff, #0088ff, #ff00ff
    );
    background-size: 200% 200%;
    mix-blend-mode: color-dodge;
    opacity: .35;
    pointer-events: none;
    animation: rainbowSpin 6s linear infinite;
  }
  @keyframes rainbowSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Continuous holographic light sweep — simulates overhead-light reflection
     on a real holo card. Sweeps a bright diagonal band across the surface. */
  .scene.revealed .card-front.shiny::before {
    opacity: 1;
    background: linear-gradient(115deg,
      transparent 30%,
      rgba(255, 255, 255, .55) 47%,
      rgba(255, 220, 255, .6) 50%,
      rgba(200, 240, 255, .55) 53%,
      transparent 70%);
    background-size: 250% 250%;
    background-position: -150% 0%;
    animation: holoSweep 2.6s linear infinite !important;
    mix-blend-mode: overlay;
  }
  @keyframes holoSweep {
    0%   { background-position: -150% 0%; }
    100% { background-position:  150% 0%; }
  }
  .card-front.shiny .name {
    background: linear-gradient(90deg, #ff00aa, #ffaa00, #00ddff, #aa00ff);
    background-size: 200% 100%;
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    animation: rainbowText 3s linear infinite;
    text-shadow: none;
  }
  @keyframes rainbowText {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .card-front.shiny .footer .rarity .star {
    color: #ff00ff;
    text-shadow: 0 0 6px #ff00ff;
  }

  /* ============================================================
     LEGENDARY variant — gold frame, shimmer border, 5 stars
     ============================================================ */
  .card-front.legendary {
    background: linear-gradient(180deg, #fff8d0 0%, #f0d878 70%, #d4a82c 100%);
    border: 14px solid #d4a82c;
    box-shadow:
      0 0 0 3px #b8860b inset,
      0 0 0 6px #fff6b8 inset,
      0 20px 50px rgba(0,0,0,.6),
      0 0 80px rgba(255,200,40,.7);
    animation: legendaryBorder 4.5s linear infinite;
  }
  @keyframes legendaryBorder {
    0%, 100% {
      border-color: #d4a82c;
      box-shadow:
        0 0 0 3px #b8860b inset,
        0 0 0 6px #fff6b8 inset,
        0 20px 50px rgba(0,0,0,.6),
        0 0 80px rgba(255,200,40,.7);
    }
    50% {
      border-color: #fff0a0;
      box-shadow:
        0 0 0 3px #d4a82c inset,
        0 0 0 6px #ffffff inset,
        0 20px 50px rgba(0,0,0,.6),
        0 0 120px rgba(255,220,80,.95);
    }
  }
  /* Slow rotating gold conic-gradient on the inside (replaces shiny rainbow) */
  .card-front.legendary::after {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 6px;
    background: conic-gradient(
      from 0deg,
      #ffd700, #fff4a0, #ffb800, #ffe680, #ffd700, #fff4a0, #ffb800, #ffd700
    );
    background-size: 200% 200%;
    mix-blend-mode: overlay;
    opacity: .45;
    pointer-events: none;
    animation: rainbowSpin 8s linear infinite;
  }
  /* Shimmering diagonal gold streak that sweeps across continuously */
  .scene.revealed .card-front.legendary::before {
    opacity: 1;
    background: linear-gradient(115deg,
      transparent 25%,
      rgba(255, 240, 180, .65) 47%,
      rgba(255, 255, 230, .8) 50%,
      rgba(255, 220, 120, .65) 53%,
      transparent 75%);
    background-size: 250% 250%;
    background-position: -150% 0%;
    animation: holoSweep 3.4s linear infinite !important;
    mix-blend-mode: overlay;
  }
  /* Gold name with subtle glow */
  .card-front.legendary .name {
    background: linear-gradient(180deg, #fff7c8 0%, #f0c020 60%, #b8860b 100%);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    text-shadow: 0 0 8px rgba(255,200,40,.5);
  }
  .card-front.legendary .footer .rarity .star {
    color: #ffd700;
    text-shadow: 0 0 8px #ffd700, 0 0 16px rgba(255,200,40,.7);
  }

  /* If a card is BOTH shiny AND legendary, layer the shiny holo over the gold */
  .card-front.shiny.legendary {
    /* shiny's RGB border wins (it's also animated), but keep the gold inset glow */
    box-shadow: 0 0 0 3px #d4a82c inset, 0 0 0 6px #ffffff inset, 0 20px 50px rgba(0,0,0,.6), 0 0 90px rgba(255,220,80,.85);
  }

  /* Sparkle particles for shiny reveal */
  .sparkles {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    opacity: 0;
  }
  .scene.revealed .sparkles { opacity: 1; }
  .sparkle {
    position: absolute;
    width: 14px; height: 14px;
    background:
      radial-gradient(circle, #fff 0%, #ffcb05 30%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
  }
  .scene.revealed .sparkle {
    animation: sparkleBurst 1.6s ease-out forwards;
  }
  @keyframes sparkleBurst {
    0%   { transform: translate(0,0) scale(0); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 0; }
  }

  /* ---------- New badge ---------- */
  .new-badge {
    position: absolute;
    top: -18px;
    right: -18px;
    background: linear-gradient(135deg, #ff3366 0%, #cc0044 100%);
    color: #fff;
    font-weight: 900;
    font-size: 18px;
    padding: 10px 18px;
    border-radius: 100px;
    transform: rotate(15deg) scale(0);
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    text-shadow: 1px 1px 0 rgba(0,0,0,.3);
    z-index: 5;
    transition: transform .5s cubic-bezier(.34,1.56,.64,1) .4s;
  }
  .scene.revealed .new-badge.show { transform: rotate(15deg) scale(1); }

  /* Scene entrance/exit */
  .scene {
    opacity: 0;
    transform: scale(.6);
    transition: opacity .5s, transform .5s cubic-bezier(.34,1.56,.64,1);
  }
  .scene.enter {
    opacity: 1;
    transform: scale(1);
  }
  .scene.exit {
    opacity: 0;
    transform: scale(.85) translateY(40px);
    transition: opacity .8s, transform .8s ease-in;
  }

  /* ============================================================
     NEW DRAMATIC EFFECTS — aura, flash, shockwave, light rays
     ============================================================ */

  /* Aura — glowing halo around the card during charge & vibrate */
  .aura {
    position: absolute;
    left: 50%; top: 50%;
    width: 380px; height: 530px;
    transform: translate(-50%, -50%) translateY(-30px);
    border-radius: 18px;
    pointer-events: none;
    opacity: 0;
    z-index: -1;
    transition: opacity .8s ease-out;
  }
  .scene.opened .aura { opacity: .4; }
  .scene.charging .aura {
    opacity: 1;
    animation: auraPulse 1.4s ease-in-out infinite;
  }
  .scene.vibrating .aura {
    opacity: 1;
    animation: auraPulseFast .22s ease-in-out infinite;
  }
  @keyframes auraPulse {
    0%, 100% {
      box-shadow:
        0 0 50px 18px var(--aura-color, #ffcb05),
        0 0 120px 40px var(--aura-color, #ffcb05);
      filter: brightness(1);
    }
    50% {
      box-shadow:
        0 0 90px 35px var(--aura-color, #ffcb05),
        0 0 200px 80px var(--aura-color, #ffcb05);
      filter: brightness(1.5);
    }
  }
  @keyframes auraPulseFast {
    0%, 100% {
      box-shadow:
        0 0 80px 30px var(--aura-color, #ffcb05),
        0 0 180px 70px var(--aura-color, #ffcb05);
      filter: brightness(1.5);
    }
    50% {
      box-shadow:
        0 0 130px 55px var(--aura-color, #ffcb05),
        0 0 260px 120px var(--aura-color, #ffcb05);
      filter: brightness(2.2);
    }
  }
  /* Shiny variant — rainbow aura that cycles colors */
  .scene.shiny-pull .aura {
    animation: auraRainbowSlow 2.2s linear infinite, auraPulse 1.4s ease-in-out infinite !important;
  }
  .scene.shiny-pull.vibrating .aura {
    animation: auraRainbow 0.6s linear infinite, auraPulseFast .22s ease-in-out infinite !important;
  }
  @keyframes auraRainbow {
    0%   { --aura-color: #ff00ff; }
    25%  { --aura-color: #ffaa00; }
    50%  { --aura-color: #00ddff; }
    75%  { --aura-color: #aaff00; }
    100% { --aura-color: #ff00ff; }
  }
  @keyframes auraRainbowSlow {
    0%   { --aura-color: #ff00ff; }
    25%  { --aura-color: #ffaa00; }
    50%  { --aura-color: #00ddff; }
    75%  { --aura-color: #aaff00; }
    100% { --aura-color: #ff00ff; }
  }
  .scene.revealed .aura {
    opacity: 0;
    transition: opacity 1s;
  }

  /* Flash overlay — full-screen white burst at reveal moment */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, white 0%, white 25%, rgba(255,255,255,0) 65%);
    opacity: 0;
    pointer-events: none;
    z-index: 90;
    transform: scale(.2);
  }
  .scene.flashing .flash-overlay {
    animation: flashBurst .9s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes flashBurst {
    0%   { opacity: 0; transform: scale(.15); }
    20%  { opacity: 1; transform: scale(2.2); }
    60%  { opacity: .6; transform: scale(3); }
    100% { opacity: 0; transform: scale(4); }
  }
  /* Shiny: rainbow flash, bigger + rotating */
  .scene.shiny-pull.flashing .flash-overlay {
    background: conic-gradient(from 0deg,
      rgba(255,0,255,1) 0deg, rgba(255,180,0,1) 60deg,
      rgba(255,255,0,1) 120deg, rgba(0,255,150,1) 180deg,
      rgba(0,200,255,1) 240deg, rgba(150,0,255,1) 300deg,
      rgba(255,0,255,1) 360deg);
    animation: flashBurstShiny 1.4s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes flashBurstShiny {
    0%   { opacity: 0; transform: scale(.15) rotate(0deg); }
    20%  { opacity: 1; transform: scale(3) rotate(180deg); }
    60%  { opacity: .7; transform: scale(4) rotate(360deg); }
    100% { opacity: 0; transform: scale(5) rotate(720deg); }
  }

  /* Shiny shockwave — expanding ring */
  .shockwave {
    position: fixed;
    left: 50%; top: 50%;
    width: 100px; height: 100px;
    transform: translate(-50%, -50%) scale(0);
    border: 14px solid rgba(255, 255, 255, .95);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 85;
    box-shadow: 0 0 80px white, 0 0 220px rgba(255, 0, 255, .85);
  }
  .scene.shiny-pull.flashing .shockwave {
    animation: shockwaveExpand 1.7s ease-out forwards;
  }
  @keyframes shockwaveExpand {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); border-width: 18px; }
    8%   { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(45); border-width: 2px; }
  }

  /* Shiny rotating light rays behind the card */
  .light-rays {
    position: absolute;
    left: 50%; top: 50%;
    width: 1400px; height: 1400px;
    transform: translate(-50%, -50%) translateY(-30px);
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,255,180,.55) 3deg, transparent 7deg,
      transparent 27deg, rgba(255,180,255,.55) 30deg, transparent 34deg,
      transparent 57deg, rgba(180,255,255,.55) 60deg, transparent 64deg,
      transparent 87deg, rgba(255,255,180,.55) 90deg, transparent 94deg,
      transparent 117deg, rgba(255,180,255,.55) 120deg, transparent 124deg,
      transparent 147deg, rgba(180,255,255,.55) 150deg, transparent 154deg,
      transparent 177deg, rgba(255,255,180,.55) 180deg, transparent 184deg);
    pointer-events: none;
    opacity: 0;
    z-index: -2;
    mix-blend-mode: screen;
    filter: blur(2px);
  }
  .scene.shiny-pull.revealed .light-rays {
    opacity: .9;
    animation: lightRayRotate 6s linear infinite;
  }
  @keyframes lightRayRotate {
    0%   { transform: translate(-50%, -50%) translateY(-30px) rotate(0deg); }
    100% { transform: translate(-50%, -50%) translateY(-30px) rotate(360deg); }
  }

  /* Shiny tag — sits BELOW the card, modern minimal style with cycling rainbow border */
  .shiny-banner {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(0px + 310px)) scale(.7);
    background: rgba(8, 8, 18, .92);
    color: #fff;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 10px;
    text-indent: 10px;                   /* visually balance the trailing letter-spacing */
    padding: 9px 22px 9px 32px;
    border-radius: 100px;
    border: 2px solid #ff00ff;
    box-shadow: 0 0 18px #ff00ff, 0 0 48px rgba(255, 0, 255, .35), 0 8px 22px rgba(0,0,0,.55);
    text-shadow: 0 0 10px rgba(255,255,255,.6);
    white-space: nowrap;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
  }
  .scene.shiny-pull.revealed .shiny-banner {
    opacity: 1;
    animation:
      shinyTagRise .6s cubic-bezier(.34, 1.56, .64, 1) .25s forwards,
      shinyBorderCycle 2.8s linear .25s infinite;
  }
  @keyframes shinyTagRise {
    0%   { transform: translate(-50%, 340px) scale(.55); opacity: 0; }
    100% { transform: translate(-50%, 290px) scale(1);   opacity: 1; }
  }
  @keyframes shinyBorderCycle {
    0%, 100% { border-color: #ff00ff; box-shadow: 0 0 18px #ff00ff, 0 0 48px rgba(255, 0, 255, .35), 0 8px 22px rgba(0,0,0,.55); }
    33%      { border-color: #00ddff; box-shadow: 0 0 18px #00ddff, 0 0 48px rgba(0, 221, 255, .35), 0 8px 22px rgba(0,0,0,.55); }
    66%      { border-color: #ffaa00; box-shadow: 0 0 18px #ffaa00, 0 0 48px rgba(255, 170, 0, .35), 0 8px 22px rgba(0,0,0,.55); }
  }

  /* ============================================================
     LEGENDARY-tier effects (scene-level)
     ============================================================ */

  /* Legendary aura — gold pulse, stronger than shiny/regular */
  .scene.legendary-pull .aura {
    animation: legendaryAuraPulse 1.3s ease-in-out infinite !important;
  }
  .scene.legendary-pull.vibrating .aura {
    animation: legendaryAuraPulse .2s ease-in-out infinite !important;
  }
  @keyframes legendaryAuraPulse {
    0%, 100% {
      box-shadow:
        0 0 80px 25px #ffd700,
        0 0 180px 60px rgba(255, 200, 40, .8);
      filter: brightness(1.2);
    }
    50% {
      box-shadow:
        0 0 140px 50px #fff6a0,
        0 0 280px 110px rgba(255, 230, 100, 1);
      filter: brightness(1.9);
    }
  }

  /* Screen-darken — brief spotlight during the build-up only, fades out after reveal */
  .screen-darken {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center,
      transparent 0%,
      rgba(0, 0, 0, .15) 50%,
      rgba(0, 0, 0, .45) 100%);
    opacity: 0;
    pointer-events: none;
    z-index: 80;
    transition: opacity 1s ease-in-out;
  }
  /* Subtle darken during the tension build-up only */
  .scene.legendary-pull.vibrating .screen-darken { opacity: .45; }
  .scene.legendary-pull.flashing  .screen-darken { opacity: .55; }
  /* On reveal, fade the dim back out — card is doing the visual work now */
  .scene.legendary-pull.revealed  .screen-darken { opacity: .2; }
  .scene.legendary-pull.settled   .screen-darken { opacity: 0; }

  /* Legendary flash — gold radial burst replacing the white/rainbow */
  .scene.legendary-pull.flashing .flash-overlay {
    background: radial-gradient(circle at center,
      #fff6c8 0%, #ffd700 25%, rgba(255, 200, 40, .4) 55%, rgba(255, 200, 40, 0) 75%);
    animation: flashBurstLegendary 1.3s cubic-bezier(.2, .8, .4, 1) forwards !important;
  }
  @keyframes flashBurstLegendary {
    0%   { opacity: 0; transform: scale(.15); }
    20%  { opacity: 1; transform: scale(2.5); }
    60%  { opacity: .65; transform: scale(3.5); }
    100% { opacity: 0; transform: scale(4.5); }
  }

  /* Legendary shockwaves — DOUBLE ring (the second one starts later) */
  .scene.legendary-pull.flashing .shockwave {
    border-color: rgba(255, 215, 0, .95);
    box-shadow: 0 0 100px #ffd700, 0 0 240px rgba(255, 200, 40, .9);
    animation: shockwaveExpandLegendary 1.9s ease-out forwards !important;
  }
  @keyframes shockwaveExpandLegendary {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); border-width: 20px; }
    6%   { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(50); border-width: 2px; }
  }
  /* Second ring fired a moment later (uses the legendary-banner element which we hide visually with display:contents for ringer behaviour) */
  .scene.legendary-pull .shockwave-2 {
    position: fixed;
    left: 50%; top: 50%;
    width: 100px; height: 100px;
    transform: translate(-50%, -50%) scale(0);
    border: 14px solid rgba(255, 245, 200, .9);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 84;
    box-shadow: 0 0 80px #fff6a0, 0 0 200px rgba(255, 220, 80, .85);
  }
  .scene.legendary-pull.flashing .shockwave-2 {
    animation: shockwaveExpandLegendary 2.2s ease-out .25s forwards;
  }

  /* Legendary light rays — gold, slower rotation, wider */
  .scene.legendary-pull .light-rays {
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,240,160,.7) 6deg, transparent 12deg,
      transparent 42deg, rgba(255,210,80,.7) 48deg, transparent 54deg,
      transparent 84deg, rgba(255,250,200,.7) 90deg, transparent 96deg,
      transparent 126deg, rgba(255,220,120,.7) 132deg, transparent 138deg,
      transparent 168deg, rgba(255,240,160,.7) 174deg, transparent 180deg);
  }
  .scene.legendary-pull.revealed .light-rays {
    opacity: 1;
    animation: lightRayRotate 10s linear infinite;
  }

  /* "⚜ LEGENDARY" tag — gold pill below the card */
  .legendary-banner {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(0px + 320px)) scale(.7);
    background: linear-gradient(180deg, #fff7c8 0%, #f0c020 60%, #b8860b 100%);
    color: #3a2400;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 10px;
    text-indent: 10px;
    padding: 9px 24px 9px 34px;
    border-radius: 100px;
    border: 2px solid #fff6b8;
    box-shadow:
      0 0 25px #ffd700,
      0 0 60px rgba(255, 200, 40, .6),
      0 8px 22px rgba(0,0,0,.55),
      0 0 0 3px rgba(184, 134, 11, .8);
    text-shadow: 0 1px 0 rgba(255,255,255,.5);
    white-space: nowrap;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
  }
  .scene.legendary-pull.revealed .legendary-banner {
    opacity: 1;
    animation:
      legendaryTagRise .7s cubic-bezier(.34, 1.56, .64, 1) .3s forwards,
      legendaryTagGlow 2.4s ease-in-out 1s infinite;
  }
  @keyframes legendaryTagRise {
    0%   { transform: translate(-50%, 380px) scale(.5); opacity: 0; }
    100% { transform: translate(-50%, 300px) scale(1);  opacity: 1; }
  }
  @keyframes legendaryTagGlow {
    0%, 100% { filter: brightness(1)   drop-shadow(0 0 10px rgba(255,215,0,.6)); }
    50%      { filter: brightness(1.2) drop-shadow(0 0 22px rgba(255,235,120,.9)); }
  }

  /* Completion celebration (full-screen takeover) */
  #complete-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,.85) 0%, rgba(0,0,0,.95) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ffcb05;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .8s;
    z-index: 100;
  }
  #complete-overlay.show { opacity: 1; }
  #complete-overlay .big {
    font-size: 96px;
    font-family: 'Impact', sans-serif;
    letter-spacing: 4px;
    text-shadow:
      -4px -4px 0 #2a3b8f, 4px -4px 0 #2a3b8f,
      -4px 4px 0 #2a3b8f, 4px 4px 0 #2a3b8f,
      0 10px 40px rgba(255,203,5,.8);
    animation: bigPulse 1.2s ease-in-out infinite;
  }
  @keyframes bigPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
  #complete-overlay .sub {
    font-size: 32px;
    color: #fff;
    margin-top: 24px;
    text-shadow: 2px 2px 0 #2a3b8f;
  }
  #complete-overlay .who { color: #ffcb05; font-weight: 900; }

  /* ---------- Debug panel (only with ?debug=1) ---------- */
  #debug {
    position: fixed;
    bottom: 12px;
    left: 12px;
    background: rgba(0,0,0,.8);
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    padding: 10px;
    border-radius: 6px;
    max-width: 380px;
    z-index: 200;
    pointer-events: auto;
    display: none;
  }
  #debug.on { display: block; }
  #debug button {
    background: #ffcb05;
    color: #2a3b8f;
    border: none;
    padding: 6px 10px;
    margin: 2px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    font-size: 11px;
  }
  #debug input {
    background: #111;
    color: #0f0;
    border: 1px solid #333;
    padding: 4px;
    font-family: monospace;
    width: 120px;
  }
  #debug .row { margin: 4px 0; }
  #debug .status { color: #0ff; }
</style>
</head>
<body>

<div id="banner"></div>

<div id="stage"></div>

<div id="complete-overlay">
  <div class="big">GOTTA CATCH 'EM ALL!</div>
  <div class="sub"><span class="who" id="complete-who"></span> just completed the Kanto Pokédex!</div>
  <div class="sub" style="font-size:24px; margin-top:40px;">🏆 First completer wins the prize 🏆</div>
</div>

<div id="debug">
  <div class="row status" id="status">connecting…</div>
  <div class="row">
    <input id="dbg-user" placeholder="username" value="testviewer">
    <input id="dbg-count" placeholder="qty" value="1" type="number" min="1" max="50" style="width:50px">
  </div>
  <div class="row">
    <button onclick="debugTrigger()">Fire gift event</button>
    <button onclick="debugShiny()">Force shiny next</button>
    <button onclick="debugReset()">Wipe local dex</button>
  </div>
  <div class="row">
    <button onclick="debugLegendary()">⚜ Force legendary</button>
    <button onclick="debugShinyLegendary()">✦⚜ Shiny legendary</button>
  </div>
  <div class="row">
    <button onclick="debugSetCount(149)">Test: 149 caught</button>
    <button onclick="debugCompletion()">Test: completion FX</button>
  </div>
</div>

<script src="cards.js"></script>
<script src="config.js"></script>
<script>
/* ============================================================
   CONFIG & STATE
   ============================================================ */
const Q = new URLSearchParams(location.search);
const cfg = Object.assign({
  // Streamer.bot WebSocket (defaults match Streamer.bot's defaults)
  streamerbotHost: '127.0.0.1',
  streamerbotPort: 8080,
  streamerbotEndpoint: '/',
  streamerbotPassword: '',

  // Event matching — set the Streamer.bot Custom Event name you'll fire from
  // your "Kick Gift Subscription" action. Default: 'pokepack'.
  customEventName: 'pokepack',

  // Also auto-listen to native Kick events if they come through:
  listenNativeKickGifts: true,

  // Shiny odds: 1 in N (independent of which Pokemon is picked)
  shinyOdds: 100,

  // Legendary rarity weight (relative to regular cards = 1.0)
  // 0.1 = legendaries are 10× less likely on any given pull.
  // Lower = rarer chase. 0.05 = 20× rarer, 0.02 = 50× rarer.
  // No-dupes means viewers WILL still get all 5 eventually — they just
  // become rarer mid-collection.
  legendaryWeight: 0.1,

  // Firebase Realtime Database REST URL (e.g. https://your-project.firebaseio.com)
  // Leave blank to run with localStorage only (no public Pokedex).
  firebaseUrl: '',

  // Pack economy: every N gifted subs earns the viewer one pack.
  // Carry-over: a viewer who gifts 1 today and 1 tomorrow earns a pack tomorrow.
  giftsPerPack: 2,
  cardsPerPack: 1,

  // Total animation length per card (ms)
  animMs: 10000,
  // How long card lingers after the 10s reveal (ms)
  lingerMs: 4000,

  // Optional custom card-back image URL (leave blank to use CSS recreation)
  cardBackImageUrl: '',
}, window.STREAM_CONFIG || {});

// URL overrides (e.g. ?shinyOdds=20 for testing)
for (const k of Object.keys(cfg)) {
  if (Q.has(k)) {
    const v = Q.get(k);
    cfg[k] = (typeof cfg[k] === 'number') ? Number(v) : v;
  }
}

const DEBUG = Q.has('debug');
if (DEBUG) document.getElementById('debug').classList.add('on');
const dbgStatus = (s) => { const el = document.getElementById('status'); if (el) el.textContent = s; };

/* ============================================================
   STORAGE — Firebase REST (optional) + localStorage fallback
   ============================================================ */
const Store = {
  async getCollection(user) {
    const key = `dex:${user}`;
    const local = JSON.parse(localStorage.getItem(key) || '{}');
    if (!cfg.firebaseUrl) return local;
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/collections/${encodeURIComponent(user)}.json`);
      const remote = await r.json();
      const merged = Object.assign({}, local, remote || {});
      localStorage.setItem(key, JSON.stringify(merged));
      return merged;
    } catch (e) {
      console.warn('Firebase read failed, using local:', e);
      return local;
    }
  },
  async savePull(user, card) {
    const key = `dex:${user}`;
    const local = JSON.parse(localStorage.getItem(key) || '{}');
    const slotKey = `${card.id}${card.shiny ? '_shiny' : ''}`;
    local[slotKey] = { id: card.id, shiny: card.shiny, name: card.name, at: Date.now() };
    localStorage.setItem(key, JSON.stringify(local));
    if (!cfg.firebaseUrl) return;
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/collections/${encodeURIComponent(user)}/${slotKey}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(local[slotKey]),
      });
    } catch (e) {
      console.warn('Firebase write failed:', e);
    }
  },
  async getCredits(user) {
    const local = parseInt(localStorage.getItem(`credits:${user}`) || '0') || 0;
    if (!cfg.firebaseUrl) return local;
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/credits/${encodeURIComponent(user)}.json`);
      const remote = await r.json();
      const v = typeof remote === 'number' ? remote : local;
      localStorage.setItem(`credits:${user}`, String(v));
      return v;
    } catch (e) {
      return local;
    }
  },
  async setCredits(user, n) {
    localStorage.setItem(`credits:${user}`, String(n));
    if (!cfg.firebaseUrl) return;
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/credits/${encodeURIComponent(user)}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(n),
      });
    } catch (e) { console.warn('credit write failed:', e); }
  },
  async markCompleter(user) {
    const key = `completers`;
    const local = JSON.parse(localStorage.getItem(key) || '[]');
    if (!local.find(x => x.user === user)) {
      local.push({ user, at: Date.now() });
      localStorage.setItem(key, JSON.stringify(local));
    }
    if (!cfg.firebaseUrl) return;
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/completers/${encodeURIComponent(user)}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, at: Date.now() }),
      });
    } catch (e) { console.warn(e); }
  }
};

/* ============================================================
   CARD SELECTION — no duplicates per viewer
   ============================================================ */
function pickCardFor(collection, forceShiny = false, forceLegendary = false) {
  // Build "owned" set keyed by base id (any version blocks dupes per request)
  const ownedIds = new Set();
  for (const k of Object.keys(collection)) {
    const v = collection[k];
    if (v && typeof v.id === 'number') ownedIds.add(v.id);
  }
  let remaining = KANTO_CARDS.filter(c => !ownedIds.has(c.id));
  if (remaining.length === 0) return null; // already complete

  // Debug: force a legendary by restricting the pool to legendaries only
  if (forceLegendary) {
    const legendaryRemaining = remaining.filter(c => c.legendary);
    if (legendaryRemaining.length > 0) remaining = legendaryRemaining;
  }

  // Weighted random selection: legendaries get cfg.legendaryWeight (default 0.1),
  // regulars get 1.0. As the pool depletes, legendaries become inevitable.
  const weights = remaining.map(c => c.legendary ? (cfg.legendaryWeight || 0.1) : 1);
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  let card = remaining[remaining.length - 1]; // safety fallback
  for (let i = 0; i < remaining.length; i++) {
    r -= weights[i];
    if (r <= 0) { card = remaining[i]; break; }
  }
  const shiny = forceShiny || (Math.random() < (1 / cfg.shinyOdds));
  return { ...card, shiny };
}

let FORCE_NEXT_SHINY = false;
let FORCE_NEXT_LEGENDARY = false;

/* ============================================================
   ANIMATION
   ============================================================ */
function buildSceneDOM(card) {
  const tc = TYPE_COLORS[card.type] || TYPE_COLORS.Normal;
  const sprites = cardSprites(card.id);
  const artUrl = card.shiny ? sprites.shiny : sprites.standard;
  // Aura colour: type colour normally, rainbow handled via CSS keyframes for shinies.
  const auraColor = tc.bg;
  // Optional custom card-back image URL from config (kept blank by default to
  // avoid hosting copyrighted artwork).
  const backImg = cfg.cardBackImageUrl || '';

  const scene = document.createElement('div');
  scene.className = 'scene';
  scene.innerHTML = `
    <!-- effects layered behind the card -->
    <div class="light-rays"></div>
    <div class="aura" style="--aura-color: ${auraColor};"></div>

    <div class="pack">
      <div class="pack-top">
        <div class="pack-foil"></div>
        <div class="pack-stripe top"></div>
      </div>
      <div class="pack-bot">
        <div class="pack-foil"></div>
        <div class="pack-logo">POKéMON<span class="sub">TRADING CARD GAME</span></div>
        <div class="pokeball"></div>
        <div class="pack-stripe bot"></div>
      </div>
      <!-- explosion sparks burst from the rip line -->
      <div class="pack-burst"></div>
    </div>

    <div class="card">
      <div class="card-face card-back${backImg ? ' has-image' : ''}">
        ${backImg ? `<img class="back-image" src="${backImg}" alt="card back">` : `
          <div class="logo-top">POKéMON</div>
          <div class="pokeball-back"></div>
          <div class="logo-bot">POKéMON</div>
        `}
      </div>
      <div class="card-face card-front ${card.shiny ? 'shiny' : ''} ${card.legendary ? 'legendary' : ''}"
           style="--type-bg:${tc.bg}; --type-border:${tc.border}; --type-text:${tc.text};">
        <div class="header">
          <div class="name">${card.name}</div>
          <div class="hp">HP<span class="num">${card.hp}</span></div>
        </div>
        <div class="art" style="background: linear-gradient(180deg, ${tc.bg}55 0%, ${tc.bg}cc 100%);">
          <div class="type-badge">${card.type.slice(0,3)}</div>
          <img src="${artUrl}" alt="${card.name}" loading="eager">
        </div>
        <div class="footer">
          <span class="dex">No. ${String(card.id).padStart(3,'0')} / 151 — Kanto</span>
          <span class="rarity">
            ${card.legendary
              ? '<span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>'
              : card.shiny
                ? '<span class="star">★</span><span class="star">★</span><span class="star">★</span>'
                : '<span class="star">★</span>'}
          </span>
        </div>
      </div>
      <div class="sparkles"></div>
      <div class="new-badge">NEW!</div>
    </div>

    <!-- rare-tier flourishes (only show when the matching scene class is set) -->
    <div class="shiny-banner">✦ SHINY</div>
    <div class="legendary-banner">⚜ LEGENDARY</div>
    <div class="shockwave"></div>
    <div class="shockwave-2"></div>
    <div class="screen-darken"></div>
    <div class="flash-overlay"></div>
  `;

  // Generate explosion sparks — random radial directions from the rip line
  const burstEl = scene.querySelector('.pack-burst');
  if (burstEl) {
    const sparkCount = card.shiny ? 36 : 26;
    for (let i = 0; i < sparkCount; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const angle = (Math.PI * (i / sparkCount)) - (Math.PI * .15) + (Math.random() - .5) * .25;
      // Upward arc — angles biased upward (0 = right, -PI/2 = up)
      const upAngle = -Math.PI / 2 + (Math.random() - .5) * Math.PI * 1.2;
      const dist = 180 + Math.random() * 260;
      s.style.setProperty('--dx', `${Math.cos(upAngle) * dist}px`);
      s.style.setProperty('--dy', `${Math.sin(upAngle) * dist}px`);
      s.style.animationDelay = `${Math.random() * .12}s`;
      const size = 8 + Math.random() * 14;
      s.style.width = `${size}px`;
      s.style.height = `${size}px`;
      burstEl.appendChild(s);
    }
  }
  // Sparkles — more for shiny, even more for legendary (and larger for legendary)
  const sparkleCount = card.legendary ? 44 : card.shiny ? 28 : 12;
  const sparklesEl = scene.querySelector('.sparkles');
  for (let i = 0; i < sparkleCount; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';

      s.style.width = `${size}px`;
      s.style.height = `${size}px`;
      s.style.background = 'radial-gradient(circle, #fff 0%, #ffd700 35%, rgba(255,200,40,.6) 65%, transparent 80%)';
      s.style.boxShadow = '0 0 20px #ffd700, 0 0 40px rgba(255,200,40,.7)';
    }
    sparklesEl.appendChild(s);
  }
  return scene;
}

function showBanner(gifter, info) {
  const b = document.getElementById('banner');
  b.innerHTML = `🎁 ${escapeHtml(gifter)} gifted a sub!<div class="sub">${escapeHtml(info)}</div>`;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), Math.min(8000, cfg.animMs + 2000));
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* Preload the chosen card's image so the spin doesn't show a blank face */
function preload(url) {
  return new Promise(resolve => {
    const i = new Image();
    i.onload = i.onerror = () => resolve();
    i.src = url;
  });
}

async function playPack(gifter, card, isNew) {
  // Build the scene
  const scene = buildSceneDOM(card);
  document.getElementById('stage').appendChild(scene);

  // Mark rarity tiers up-front so the matching CSS rules apply throughout
  if (card.shiny) scene.classList.add('shiny-pull');
  if (card.legendary) scene.classList.add('legendary-pull');

  // Preload art so the reveal doesn't show a blank face
  const sprites = cardSprites(card.id);
  await preload(card.shiny ? sprites.shiny : sprites.standard);

  // Show NEW badge if applicable (every pull is new since no dupes)
  if (isNew) scene.querySelector('.new-badge').classList.add('show');

  // === Dramatic Timeline (no front-face peek) =================
  // 0.0s  → 1.6s : pack SPINS in, lands facing camera
  // 1.6s  → 1.9s : brief beat of suspense
  // 1.9s  → 3.0s : pack top EXPLODES off with firework sparks
  // 2.3s  → 3.3s : card back slides up out of the pack (overlaps explosion)
  // 3.3s  → 5.6s : CHARGING — glowing aura, slow breathing pulse
  // 5.6s  → 6.6s : VIBRATING — card shakes, aura intensifies
  // 6.6s  → 7.4s : FLASH — screen burst (rainbow shockwave for shinies)
  //                ~200ms into flash: card-back fades out, card-front fades in
  // 7.4s  → end  : REVEALED — sparkles, shiny tag rises below, card floats
  // +lingerMs    : exit slide
  // =============================================================

  requestAnimationFrame(() => scene.classList.add('enter'));

  // Let the pack finish its spin-in
  await wait(1600);

  // Brief suspense beat
  await wait(300);

  // EXPLOSION — pack top blasts off, sparks fly outward
  scene.classList.add('exploded');

  // Card back rises out of the pack while sparks are still flying
  await wait(400);
  scene.classList.add('opened');

  // Card settles into floating position
  await wait(1000);

  // Charge phase — aura pulses, card breathes
  scene.classList.add('charging');
  await wait(2300);

  // Vibrate phase — card shakes, aura intensifies
  scene.classList.remove('charging');
  scene.classList.add('vibrating');
  await wait(1000);

  // FLASH + REVEAL — flash bursts, card-back cross-fades to card-front mid-flash
  scene.classList.remove('vibrating');
  scene.classList.add('flashing');
  await wait(200);                    // let the flash build first
  scene.classList.add('revealed');    // back fades out, front fades in
  await wait(800);                    // flash finishes
  scene.classList.remove('flashing');

  // Settle into floating state
  await wait(400);
  scene.classList.add('settled');

  // Linger so chat has time to react
  await wait(cfg.lingerMs);

  // Exit
  scene.classList.add('exit');
  await wait(900);
  scene.remove();
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   QUEUE
   ============================================================ */
const queue = [];
let busy = false;

async function enqueueGift(gifter, count = 1) {
  count = Math.max(1, parseInt(count) || 1);
  const user = gifter || 'Anonymous';

  // Add gifts to this viewer's credit balance
  let credits = await Store.getCredits(user);
  credits += count;

  // How many packs do they earn now?
  const packsEarned = Math.floor(credits / cfg.giftsPerPack);
  const remainder = credits % cfg.giftsPerPack;
  await Store.setCredits(user, remainder);

  if (packsEarned === 0) {
    // Not enough yet — show a "progress" banner and bail
    showBanner(user, `🎁 +${count} sub${count>1?'s':''} → ${remainder}/${cfg.giftsPerPack} toward a pack`);
    dbgStatus(`${user}: ${count} gifted, ${remainder}/${cfg.giftsPerPack}`);
    return;
  }

  const totalCards = packsEarned * cfg.cardsPerPack;
  queue.push({ gifter: user, total: totalCards, packsEarned, remainder, giftCount: count });
  dbgStatus(`${user}: ${count} gifted → ${packsEarned} pack${packsEarned>1?'s':''} (carry: ${remainder})`);
  if (!busy) drain();
}

async function drain() {
  busy = true;
  while (queue.length) {
    const job = queue.shift();
    const gifter = job.gifter || 'Anonymous';

    let collection = await Store.getCollection(gifter);
    const totalOwned = countOwned(collection);

    const carryLine = job.remainder > 0 ? ` · carry ${job.remainder}/${cfg.giftsPerPack}` : '';
    showBanner(gifter, `${job.packsEarned} pack${job.packsEarned>1?'s':''} earned · Pokédex ${totalOwned}/151${carryLine}`);
    await wait(800);

    for (let i = 0; i < job.total; i++) {
      const forceShiny = FORCE_NEXT_SHINY; FORCE_NEXT_SHINY = false;
      const forceLeg = FORCE_NEXT_LEGENDARY; FORCE_NEXT_LEGENDARY = false;
      const card = pickCardFor(collection, forceShiny, forceLeg);
      if (!card) {
        // Completed already — fire celebration once
        await celebrate(gifter);
        break;
      }
      const isNew = true; // by design we never give dupes, so every pull is new
      await playPack(gifter, card, isNew);
      // Update collection state
      const slotKey = `${card.id}${card.shiny ? '_shiny' : ''}`;
      collection[slotKey] = { id: card.id, shiny: card.shiny, name: card.name, at: Date.now() };
      await Store.savePull(gifter, card);

      // Check completion after this pull
      if (countOwned(collection) === 151) {
        await celebrate(gifter);
        break;
      }
      await wait(400);
    }
  }
  busy = false;
}

function countOwned(collection) {
  const ids = new Set();
  for (const k of Object.keys(collection)) {
    const v = collection[k];
    if (v && typeof v.id === 'number') ids.add(v.id);
  }
  return ids.size;
}

async function celebrate(user) {
  await Store.markCompleter(user);
  document.getElementById('complete-who').textContent = user;
  const ov = document.getElementById('complete-overlay');
  ov.classList.add('show');
  await wait(10000);
  ov.classList.remove('show');
}

/* ============================================================
   STREAMER.BOT WEBSOCKET CONNECTION
   ============================================================ */
let ws = null;
let reconnectTimer = null;

function connect() {
  const url = `ws://${cfg.streamerbotHost}:${cfg.streamerbotPort}${cfg.streamerbotEndpoint}`;
  dbgStatus(`connecting ${url}`);
  try {
    ws = new WebSocket(url);
  } catch (e) {
    dbgStatus(`ws error: ${e.message}`);
    scheduleReconnect();
    return;
  }
  ws.addEventListener('open', () => {
    dbgStatus('connected');
    // Authenticate if password is set
    if (cfg.streamerbotPassword) {
      ws.send(JSON.stringify({
        request: 'Authenticate',
        id: 'auth',
        password: cfg.streamerbotPassword,
      }));
    }
    // Subscribe to events:
    //   Raw.Action      — primary path. Fires whenever any Streamer.bot action runs.
    //                     We filter by action name so we only react to our `pokepack` action.
    //                     This is the ONLY path that reliably works in Streamer.bot v1.0.4
    //                     (Custom Event Trigger sub-actions don't broadcast over WS in that version).
    //   General.Custom  — secondary fallback for newer versions that DO broadcast Custom events.
    //   Kick.*          — tertiary fallback if you want the overlay to react to raw Kick events.
    const events = {
      Raw: ['Action'],
      General: ['Custom'],
    };
    if (cfg.listenNativeKickGifts) {
      events.Kick = ['GiftSubscription', 'Subscription', 'Resubscription', 'MassGiftSubscription'];
    }
    ws.send(JSON.stringify({
      request: 'Subscribe',
      id: 'sub-main',
      events,
    }));
  });
  ws.addEventListener('message', (m) => {
    let msg; try { msg = JSON.parse(m.data); } catch { return; }
    handleSbMessage(msg);
  });
  ws.addEventListener('close', () => {
    dbgStatus('disconnected — retrying in 3s');
    scheduleReconnect();
  });
  ws.addEventListener('error', () => {
    dbgStatus('connection error');
  });
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, 3000);
}

function handleSbMessage(msg) {
  // Streamer.bot pushes events with { event: { source, type }, data: {...} }
  const ev = msg.event || {};
  const data = msg.data || {};

  // Verbose logging in debug mode so we can see exactly what arrives
  if (DEBUG && ev.type) {
    console.log('[SB event]', ev.source, ev.type, data);
  }

  // ---- Raw.Action — primary path, works on Streamer.bot v1.0.4 ----
  // Streamer.bot broadcasts a Raw.Action event every time any action runs.
  // We filter by the action's name so we only react to our `pokepack` action.
  if (ev.source === 'Raw' && ev.type === 'Action') {
    if (data.name === cfg.customEventName) {
      const args = data.arguments || {};
      const user = args.user || args.gifter || args.username || args.userName || 'Anonymous';
      const count = parseInt(args.count || args.gifts || args.quantity || args.giftCount || 1) || 1;
      dbgStatus(`action ${data.name}: ${user} x${count}`);
      enqueueGift(user, count);
    }
    return;
  }

  // ---- Custom event from your Streamer.bot Custom Event Trigger ----
  // In Streamer.bot v1.0+ the source for Custom events is "Misc" (not "General").
  // We accept any source as long as the type is Custom — most robust across versions.
  if (ev.type === 'Custom') {
    const name = data.name || data.eventName || data.event;
    if (name === cfg.customEventName) {
      // Args may be nested under `args` in v1.0+, or flat in older versions
      const args = data.args || data;
      const user = args.user || args.gifter || args.username || args.userName || 'Anonymous';
      const count = parseInt(args.count || args.gifts || args.quantity || args.giftCount || 1) || 1;
      dbgStatus(`custom event: ${user} x${count}`);
      enqueueGift(user, count);
    }
    return;
  }

  // ---- Native Kick sub events (forwarded directly by Streamer.bot) ----
  // All four event types count toward packs:
  //   GiftSubscription, MassGiftSubscription → gifter gets the credit
  //   Subscription, Resubscription            → the subscriber gets the credit (their own pack)
  if (ev.source === 'Kick' && cfg.listenNativeKickGifts) {
    const accepted = [
      'GiftSubscription', 'MassGiftSubscription',
      'Subscription', 'Resubscription',
      'GiftedSubscriptions' // legacy name, kept for safety
    ];
    if (!accepted.includes(ev.type)) return;

    // Streamer.bot Kick event payloads commonly include:
    //   userName / user_name / gifter (giver for gifts, subscriber for regular subs)
    //   quantity / giftCount / count (number of subs gifted, or 1 for regular subs)
    const user =
      data.userName || data.user_name || data.gifter?.username || data.gifter?.name ||
      data.user?.name || data.user || 'Anonymous';
    const count = parseInt(
      data.quantity || data.giftCount || data.count || data.giftees?.length || 1
    ) || 1;
    dbgStatus(`kick ${ev.type}: ${user} x${count}`);
    enqueueGift(user, count);
    return;
  }
}

connect();

}

window.debugShiny = debugShiny;
window.debugLegendary = debugLegendary;
window.debugShinyLegendary = debugShinyLegendary;
window.debugReset = debugReset;
window.debugSetCount = debugSetCount;
window.debugCompletion = debugCompletion;

// Hotkey for testing in a real browser (not OBS): press G to fire a test gift
window.addEventListener('keydown', (e) => {
  if (!DEBUG) return;
  if (e.key.toLowerCase() === 'g') debugTrigger();
  if (e.key.toLowerCase() === 's') debugShiny();
});
</script>
