function showBanner(gifter, info) {
  const b = document.getElementById('banner');
  b.innerHTML = `🎁 ${escapeHtml(gifter)} gifted a sub!<div class="sub">${escapeHtml(info)}</div>`;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), Math.min(8000, cfg.animMs + 2000));
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* Preload the chosen card's image so the spin doesn't show a blank face */
function preload(url) {
  return new Promise(resolve => {
    const i = new Image();
    i.onload = i.onerror = () => resolve();
    i.src = url;
  });
}

async function playPack(gifter, card, isNew) {
  // Build the scene
  const scene = buildSceneDOM(card);
  document.getElementById('stage').appendChild(scene);

  // Mark rarity tiers up-front so the matching CSS rules apply throughout
  if (card.shiny) scene.classList.add('shiny-pull');
  if (card.legendary) scene.classList.add('legendary-pull');

  // Preload art so the reveal doesn't show a blank face
  const sprites = cardSprites(card.id);
  await preload(card.shiny ? sprites.shiny : sprites.standard);

  // Show NEW badge if applicable (every pull is new since no dupes)
  if (isNew) scene.querySelector('.new-badge').classList.add('show');

  // === Dramatic Timeline (no front-face peek) =================
  // 0.0s  → 1.6s : pack SPINS in, lands facing camera
  // 1.6s  → 1.9s : brief beat of suspense
  // 1.9s  → 3.0s : pack top EXPLODES off with firework sparks
  // 2.3s  → 3.3s : card back slides up out of the pack (overlaps explosion)
  // 3.3s  → 5.6s : CHARGING — glowing aura, slow breathing pulse
  // 5.6s  → 6.6s : VIBRATING — card shakes, aura intensifies
  // 6.6s  → 7.4s : FLASH — screen burst (rainbow shockwave for shinies)
  //                ~200ms into flash: card-back fades out, card-front fades in
  // 7.4s  → end  : REVEALED — sparkles, shiny tag rises below, card floats
  // +lingerMs    : exit slide
  // =============================================================

  requestAnimationFrame(() => scene.classList.add('enter'));

  // Let the pack finish its spin-in
  await wait(1600);

  // Brief suspense beat
  await wait(300);

  // EXPLOSION — fire SFX early, then visual after the OBS audio offset
  Sfx.packTear();
  await wait(cfg.audioOffsetMs || 0);
  scene.classList.add('exploded');

  // Card back rises out of the pack while sparks are still flying
  await wait(400);
  scene.classList.add('opened');

  // Card settles into floating position
  await wait(1000);

  // Charge phase — aura pulses, card breathes
  scene.classList.add('charging');
  await wait(2300);

  // Vibrate phase — card shakes, aura intensifies
  scene.classList.remove('charging');
  scene.classList.add('vibrating');
  await wait(1000);

  // FLASH + REVEAL — fire SFX early (rarity-aware), then visual after the OBS audio offset
  scene.classList.remove('vibrating');
  Sfx.reveal(card);
  await wait(cfg.audioOffsetMs || 0);
  scene.classList.add('flashing');
  await wait(200);                    // let the flash build first
  scene.classList.add('revealed');    // back fades out, front fades in
  await wait(800);                    // flash finishes
  scene.classList.remove('flashing');

  // Settle into floating state
  await wait(400);
  scene.classList.add('settled');

  // Linger so chat has time to react
  await wait(cfg.lingerMs);

  // Exit
  scene.classList.add('exit');
  await wait(900);
  scene.remove();
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   QUEUE
   ============================================================ */
const queue = [];
let busy = false;

async function enqueueGift(gifter, count = 1) {
  count = Math.max(1, parseInt(count) || 1);
  const user = gifter || 'Anonymous';

  // Add gifts to this viewer's credit balance
  let credits = await Store.getCredits(user);
  credits += count;

  // How many packs do they earn now?
  const packsEarned = Math.floor(credits / cfg.giftsPerPack);
  const remainder = credits % cfg.giftsPerPack;
  await Store.setCredits(user, remainder);

  if (packsEarned === 0) {
    // Not enough yet — show a "progress" banner and bail
    showBanner(user, `🎁 +${count} sub${count>1?'s':''} → ${remainder}/${cfg.giftsPerPack} toward a pack`);
    dbgStatus(`${user}: ${count} gifted, ${remainder}/${cfg.giftsPerPack}`);
    return;
  }

  const totalCards = packsEarned * cfg.cardsPerPack;
  queue.push({ gifter: user, total: totalCards, packsEarned, remainder, giftCount: count });
  dbgStatus(`${user}: ${count} gifted → ${packsEarned} pack${packsEarned>1?'s':''} (carry: ${remainder})`);
  if (!busy) drain();
}

async function drain() {
  busy = true;
  while (queue.length) {
    const job = queue.shift();
    const gifter = job.gifter || 'Anonymous';

    let collection = await Store.getCollection(gifter);
    const totalOwned = countOwned(collection);

    const carryLine = job.remainder > 0 ? ` · carry ${job.remainder}/${cfg.giftsPerPack}` : '';
    showBanner(gifter, `${job.packsEarned} pack${job.packsEarned>1?'s':''} earned · Pokédex ${totalOwned}/151${carryLine}`);
    await wait(800);

    for (let i = 0; i < job.total; i++) {
      const forceShiny = FORCE_NEXT_SHINY; FORCE_NEXT_SHINY = false;
      const forceLeg = FORCE_NEXT_LEGENDARY; FORCE_NEXT_LEGENDARY = false;
      // Snapshot completion state BEFORE this pull — used to detect the
      // 150→151 unique transition so the prize celebration fires once only.
      const wasComplete = countOwned(collection) === 151;
      const card = pickCardFor(collection, forceShiny, forceLeg);
      if (!card) {
        // 302/302 — all standard + shiny slots filled. Stop silently; the
        // prize celebration already fired the first time they hit 151 unique.
        break;
      }
      const isNew = true; // by design we never give dupes, so every pull is new
      await playPack(gifter, card, isNew);
      // Update collection state
      const slotKey = `${card.id}${card.shiny ? '_shiny' : ''}`;
      collection[slotKey] = { id: card.id, shiny: card.shiny, name: card.name, at: Date.now() };
      await Store.savePull(gifter, card);

      // Celebrate only on the transition incomplete → 151 unique. Once they're
      // already complete, subsequent shiny-fill pulls must NOT refire.
      const isCompleteNow = countOwned(collection) === 151;
      if (!wasComplete && isCompleteNow) {
        await celebrate(gifter);
        break;
      }
      await wait(400);
    }
  }
  busy = false;
}

function countOwned(collection) {
  const ids = new Set();
  for (const k of Object.keys(collection)) {
    const v = collection[k];
    if (v && typeof v.id === 'number') ids.add(v.id);
  }
  return ids.size;
}

async function celebrate(user) {
  await Store.markCompleter(user);
  document.getElementById('complete-who').textContent = user;
  const ov = document.getElementById('complete-overlay');
  ov.classList.add('show');
  await wait(10000);
  ov.classList.remove('show');
}

/* ============================================================
   STREAMER.BOT WEBSOCKET CONNECTION
   ============================================================ */
let ws = null;
let reconnectTimer = null;

function connect() {
  const url = `ws://${cfg.streamerbotHost}:${cfg.streamerbotPort}${cfg.streamerbotEndpoint}`;
  dbgStatus(`connecting ${url}`);
  try {
    ws = new WebSocket(url);
  } catch (e) {
    dbgStatus(`ws error: ${e.message}`);
    scheduleReconnect();
    return;
  }
  ws.addEventListener('open', () => {
    dbgStatus('connected');
    // Authenticate if password is set
    if (cfg.streamerbotPassword) {
      ws.send(JSON.stringify({
        request: 'Authenticate',
        id: 'auth',
        password: cfg.streamerbotPassword,
      }));
    }
    // Subscribe to events:
    //   Raw.Action      — primary path. Fires whenever any Streamer.bot action runs.
    //                     We filter by action name so we only react to our `pokepack` action.
    //                     This is the ONLY path that reliably works in Streamer.bot v1.0.4
    //                     (Custom Event Trigger sub-actions don't broadcast over WS in that version).
    //   General.Custom  — secondary fallback for newer versions that DO broadcast Custom events.
    //   Kick.*          — tertiary fallback if you want the overlay to react to raw Kick events.
    const events = {
      Raw: ['Action'],
      General: ['Custom'],
    };
    if (cfg.listenNativeKickGifts) {
      events.Kick = ['GiftSubscription', 'Subscription', 'Resubscription', 'MassGiftSubscription'];
    }
    ws.send(JSON.stringify({
      request: 'Subscribe',
      id: 'sub-main',
      events,
    }));
  });
  ws.addEventListener('message', (m) => {
    let msg; try { msg = JSON.parse(m.data); } catch { return; }
    handleSbMessage(msg);
  });
  ws.addEventListener('close', () => {
    dbgStatus('disconnected — retrying in 3s');
    scheduleReconnect();
  });
  ws.addEventListener('error', () => {
    dbgStatus('connection error');
  });
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, 3000);
}

function handleSbMessage(msg) {
  // Streamer.bot pushes events with { event: { source, type }, data: {...} }
  const ev = msg.event || {};
  const data = msg.data || {};

  // Verbose logging in debug mode so we can see exactly what arrives
  if (DEBUG && ev.type) {
    console.log('[SB event]', ev.source, ev.type, data);
  }

  // ---- Raw.Action — primary path, works on Streamer.bot v1.0.4 ----
  // Streamer.bot broadcasts a Raw.Action event every time any action runs.
  // We filter by the action's name so we only react to our `pokepack` action.
  if (ev.source === 'Raw' && ev.type === 'Action') {
    if (data.name === cfg.customEventName) {
      const args = data.arguments || {};
      const user = args.user || args.gifter || args.username || args.userName || 'Anonymous';
      // Count: prefer args.count, else count Kick's indexed mass-gift recipients
      // (recipient.0.userId, recipient.1.userId, ...), else default to 1 for
      // singles, subs and resubs.
      let count = parseInt(args.count || args.gifts || args.quantity || args.giftCount || 0) || 0;
      if (count <= 0) {
        let i = 0;
        while (args[`recipient.${i}.userId`]) i++;
        count = i > 0 ? i : 1;
      }
      dbgStatus(`action ${data.name}: ${user} x${count}`);
      enqueueGift(user, count);
    }
    return;
  }

  // ---- Custom event from your Streamer.bot Custom Event Trigger ----
  // In Streamer.bot v1.0+ the source for Custom events is "Misc" (not "General").
  // We accept any source as long as the type is Custom — most robust across versions.
  if (ev.type === 'Custom') {
    const name = data.name || data.eventName || data.event;
    if (name === cfg.customEventName) {
      // Args may be nested under `args` in v1.0+, or flat in older versions
      const args = data.args || data;
      const user = args.user || args.gifter || args.username || args.userName || 'Anonymous';
      const count = parseInt(args.count || args.gifts || args.quantity || args.giftCount || 1) || 1;
      dbgStatus(`custom event: ${user} x${count}`);
      enqueueGift(user, count);
    }
    return;
  }

  // ---- Native Kick sub events (forwarded directly by Streamer.bot) ----
  // All four event types count toward packs:
  //   GiftSubscription, MassGiftSubscription → gifter gets the credit
  //   Subscription, Resubscription            → the subscriber gets the credit (their own pack)
  if (ev.source === 'Kick' && cfg.listenNativeKickGifts) {
    const accepted = [
      'GiftSubscription', 'MassGiftSubscription',
      'Subscription', 'Resubscription',
      'GiftedSubscriptions' // legacy name, kept for safety
    ];
    if (!accepted.includes(ev.type)) return;

    // Streamer.bot Kick event payloads commonly include:
    //   userName / user_name / gifter (giver for gifts, subscriber for regular subs)
    //   quantity / giftCount / count (number of subs gifted, or 1 for regular subs)
    const user =
      data.userName || data.user_name || data.gifter?.username || data.gifter?.name ||
      data.user?.name || data.user || 'Anonymous';
    const count = parseInt(
      data.quantity || data.giftCount || data.count || data.giftees?.length || 1
    ) || 1;
    dbgStatus(`kick ${ev.type}: ${user} x${count}`);
    enqueueGift(user, count);
    return;
  }
}

connect();

/* ============================================================
   WILD POKÉMON SPAWN SYSTEM
   The overlay schedules auto-spawns + responds to manual !spawn requests
   from Streamer.bot (which writes /spawn_request = true in Firebase).
   Catching itself is handled by the !pokecatch action — this code just
   renders the spawn visual, listens for changes, animates capture/flee,
   and tidies up Firebase state.
   ============================================================ */
let wildSpawnState = null;       // { spawnId, pokemonId, expiresAt }
let wildSpawnTimer = null;       // setTimeout id for next auto-spawn
let wildSpawnPollTimer = null;   // setInterval id watching /active_spawn + /spawn_request
let wildSpawnResolutionPoll = null;
let spawnsThisSession = 0;
let wildSpawnLastSeenAttempt = '';
let wildSpawnTimerInterval = null;

function wsConfig() {
  return Object.assign({
    enabled: true,
    firstSpawnMinMs:  5 * 60 * 1000,
    firstSpawnMaxMs: 60 * 60 * 1000,
    intervalMinMs:   60 * 60 * 1000,
    intervalMaxMs:  180 * 60 * 1000,
    timeoutMs:        5 * 60 * 1000,
    maxPerSession: 2,
  }, cfg.wildSpawn || {});
}

function pickWildPokemon() {
  // Random 1-151 from KANTO_CARDS
  const card = KANTO_CARDS[Math.floor(Math.random() * KANTO_CARDS.length)];
  return card;
}

// forced=true bypasses the maxPerSession cap. Used by manual !spawn requests
// so the broadcaster can keep dropping wild Pokémon after the auto cap.
async function triggerWildSpawn(forced = false) {
  const ws = wsConfig();
  if (!ws.enabled) return;
  if (!forced && spawnsThisSession >= ws.maxPerSession) {
    console.log('[wildspawn] auto-cap reached — use !spawn to force more');
    return;
  }
  if (busy || wildSpawnState) {
    // Pack opening or spawn already active — retry in 10s
    console.log('[wildspawn] deferred (busy or active spawn)');
    setTimeout(() => triggerWildSpawn(forced), 10000);
    return;
  }

  const card = pickWildPokemon();
  if (!card) return;
  const now = Date.now();
  const spawn = {
    spawnId: 'sp_' + now,
    pokemonId: card.id,
    pokemonName: card.name,
    startedAt: now,
    expiresAt: now + ws.timeoutMs,
    winner: null,
  };

  // Write /active_spawn to Firebase so !pokecatch can see it
  if (cfg.firebaseUrl) {
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/active_spawn.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(spawn),
      });
    } catch (e) {
      console.warn('[wildspawn] /active_spawn write failed:', e);
      return;
    }
  }

  wildSpawnState = spawn;
  if (!forced) spawnsThisSession++;
  renderWildSpawn(card, spawn);
  startResolutionPoll(spawn);
  const tag = forced ? '(forced)' : `(${spawnsThisSession}/${ws.maxPerSession})`;
  dbgStatus(`Wild ${card.name} spawned ${tag}`);
}

// Pokémon that fly or hover. They use the flyPath/flyBob animations so they
// drift around the middle of the overlay instead of walking the bottom.
const FLYING_POKEMON_IDS = new Set([
  6,   // Charizard
  12,  // Butterfree
  15,  // Beedrill
  16, 17, 18,  // Pidgey line
  21, 22,      // Spearow line
  41, 42,      // Zubat line
  49,          // Venomoth
  83,          // Farfetch'd
  123,         // Scyther
  142,         // Aerodactyl
  144, 145, 146,  // Articuno / Zapdos / Moltres
  149,         // Dragonite
]);

// Animated GIF sprite (PokeAPI's Showdown mirror — pre-animated, breathing).
// Falls back to the standard static sprite if the GIF 404s.
function showdownSpriteUrl(id) {
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${id}.gif`;
}

function renderWildSpawn(card, spawn) {
  // Tear down any leftover wild-spawn DOM nodes first
  ['wild-spawn-intro', 'wild-spawn-sprite', 'wild-spawn-hint', 'wild-spawn-status']
    .forEach(id => { const e = document.getElementById(id); if (e) e.remove(); });

  const isFlying = FLYING_POKEMON_IDS.has(card.id);
  const spriteUrl = showdownSpriteUrl(card.id);
  const fallback = (cardSprites(card.id) || {}).standard || '';

  // ---- Dramatic intro banner — flashes for ~3 seconds then fades up
  const intro = document.createElement('div');
  intro.id = 'wild-spawn-intro';
  intro.textContent = `🌿 A WILD ${card.name.toUpperCase()} APPEARED!`;
  document.body.appendChild(intro);
  requestAnimationFrame(() => intro.classList.add('show'));
  setTimeout(() => {
    intro.classList.remove('show');
    intro.classList.add('fade');
    setTimeout(() => intro.remove(), 900);
  }, 2800);

  // ---- The roaming sprite itself
  const sprite = document.createElement('div');
  sprite.id = 'wild-spawn-sprite';
  sprite.className = isFlying ? 'flying' : 'walking';
  sprite.innerHTML =
    `<img src="${spriteUrl}" alt="${escapeHtml(card.name)}" ` +
    `onerror="this.onerror=null;this.src='${fallback}';">`;
  document.body.appendChild(sprite);

  // ---- Pulsing "!pokecatch" hint anchored at the bottom-center
  const hint = document.createElement('div');
  hint.id = 'wild-spawn-hint';
  hint.innerHTML = `💬 Type <strong>!pokecatch</strong> to catch it!`;
  document.body.appendChild(hint);

  // ---- Status line container (populated by showSpawnStatus on attempts)
  const status = document.createElement('div');
  status.id = 'wild-spawn-status';
  document.body.appendChild(status);
}

// Flash a status line above the sprite. Pass long=true for the catch
// celebration text which stays visible for ~5 seconds; default is the
// shorter 1.8s pop used for misses, fleeing etc.
function showSpawnStatus(text, long) {
  const status = document.getElementById('wild-spawn-status');
  if (!status) return;
  status.textContent = text;
  // Reset both classes then re-add the right one (forces animation to re-run)
  status.classList.remove('show', 'show-long');
  void status.offsetWidth; // force reflow so the animation re-runs
  status.classList.add(long ? 'show-long' : 'show');
}

function startResolutionPoll(spawn) {
  clearInterval(wildSpawnResolutionPoll);
  wildSpawnLastSeenAttempt = '';
  wildSpawnResolutionPoll = setInterval(async () => {
    if (!cfg.firebaseUrl) {
      clearInterval(wildSpawnResolutionPoll);
      return;
    }
    let current = null;
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/active_spawn.json`);
      if (r.ok) current = await r.json();
    } catch (e) { return; }

    // Spawn was cleared externally?
    if (!current || current.spawnId !== spawn.spawnId) {
      clearInterval(wildSpawnResolutionPoll);
      await clearWildSpawn();
      return;
    }

    // Newest attempt → flash a status line
    if (current.attempts) {
      const entries = Object.entries(current.attempts);
      entries.sort((a, b) => (a[1].at || 0) - (b[1].at || 0));
      const newest = entries[entries.length - 1];
      if (newest) {
        const sig = newest[0] + ':' + newest[1].at;
        if (sig !== wildSpawnLastSeenAttempt) {
          wildSpawnLastSeenAttempt = sig;
          const name = newest[1].displayName || newest[0];
          showSpawnStatus(newest[1].success
            ? `🎉 ${name} caught it!`
            : `💨 ${name} missed!`);
        }
      }
    }

    // Winner claimed → animate capture
    if (current.winner) {
      clearInterval(wildSpawnResolutionPoll);
      await handleSpawnWin(spawn, current.winner);
      return;
    }

    // Timeout → flee
    if (Date.now() > spawn.expiresAt) {
      clearInterval(wildSpawnResolutionPoll);
      await handleSpawnFlee(spawn);
      return;
    }
  }, 1200);
}

async function handleSpawnWin(spawn, winnerName) {
  const sprite = document.getElementById('wild-spawn-sprite');
  const hint = document.getElementById('wild-spawn-hint');
  if (hint) hint.remove();

  if (sprite) {
    // 1. Freeze sprite at its CURRENT viewport position (capture before
    //    killing the keyframe animation, otherwise it snaps to base CSS).
    const rect = sprite.getBoundingClientRect();
    sprite.style.animation = 'none';
    sprite.style.left = rect.left + 'px';
    sprite.style.top = rect.top + 'px';
    sprite.style.bottom = 'auto';
    sprite.style.right = 'auto';

    // 2. Position the pokéball centered on the sprite (ball is 62px wide now).
    const pb = document.createElement('div');
    pb.id = 'pokeball-throw';
    pb.style.left = (rect.left + rect.width / 2 - 31) + 'px';
    pb.style.top  = (rect.top  + rect.height / 2 - 31) + 'px';
    document.body.appendChild(pb);

    // 2b. White "opening" flash — radiates from the Pokémon's centre when the
    //     ball lands, simulating the pokéball opening + capture beam.
    const flash = document.createElement('div');
    flash.id = 'pokeball-flash';
    flash.style.left = (rect.left + rect.width / 2) + 'px';
    flash.style.top  = (rect.top  + rect.height / 2) + 'px';
    document.body.appendChild(flash);

    // 3. Trigger the full catch sequence (all animations choreographed to 2.8s).
    requestAnimationFrame(() => {
      pb.classList.add('catchsequence');
      sprite.classList.add('absorbing');
      // flash animation starts immediately because its CSS sets animation on the base selector
    });

    // 4. Play the catch sound effect (if enabled and the file is configured).
    playCatchSfx();

    // 5. Wait for the full ball animation to complete.
    await wait(2900);

    // 6. Celebration line — flash up the winner's name. show-long variant
    //    stays visible ~5s so viewers have time to read it before fade-out.
    showSpawnStatus(`🎉 ${winnerName} CAUGHT IT!`, true);
    await wait(5000);

    if (pb.parentElement) pb.remove();
    const f = document.getElementById('pokeball-flash');
    if (f && f.parentElement) f.remove();
  }
  await clearWildSpawn();
}

// Plays the OG-style catch sound. Reads cfg.wildSpawn.catchSoundUrl —
// if blank, silently no-ops. Reuses cfg.soundsEnabled / cfg.soundVolume
// so it follows the same on/off + volume rules as your pack sounds.
function playCatchSfx() {
  if (!cfg.soundsEnabled) return;
  const url = (cfg.wildSpawn && cfg.wildSpawn.catchSoundUrl) || '';
  if (!url) return;
  try {
    const audio = new Audio(url);
    audio.volume = typeof cfg.soundVolume === 'number' ? cfg.soundVolume : 0.5;
    audio.play().catch(e => console.warn('[wildspawn] sound play failed:', e));
  } catch (e) { console.warn('[wildspawn] sound init failed:', e); }
}

async function handleSpawnFlee(spawn) {
  const sprite = document.getElementById('wild-spawn-sprite');
  const hint = document.getElementById('wild-spawn-hint');
  if (hint) hint.remove();

  showSpawnStatus('💨 The Pokémon fled!');
  if (sprite) {
    sprite.style.animation = 'none';
    sprite.classList.add('fled');
  }
  await wait(1500);
  await clearWildSpawn();
}

async function clearWildSpawn() {
  clearInterval(wildSpawnTimerInterval);
  clearInterval(wildSpawnResolutionPoll);
  wildSpawnState = null;

  // Remove all wild-spawn DOM
  ['wild-spawn-intro', 'wild-spawn-sprite', 'wild-spawn-hint', 'wild-spawn-status']
    .forEach(id => { const e = document.getElementById(id); if (e) e.remove(); });

  if (cfg.firebaseUrl) {
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/active_spawn.json`, { method: 'DELETE' });
    } catch (e) {}
  }
  scheduleNextWildSpawn();
}

function scheduleNextWildSpawn() {
  clearTimeout(wildSpawnTimer);
  const ws = wsConfig();
  if (!ws.enabled) return;
  if (spawnsThisSession >= ws.maxPerSession) {
    console.log('[wildspawn] auto-cap reached, no further auto-spawns scheduled');
    return;
  }
  const delay = ws.intervalMinMs + Math.random() * (ws.intervalMaxMs - ws.intervalMinMs);
  wildSpawnTimer = setTimeout(() => triggerWildSpawn(false), delay);
  console.log(`[wildspawn] next auto-spawn in ${Math.round(delay / 60000)} min`);
}

async function pollSpawnRequest() {
  if (!cfg.firebaseUrl) return;

  // ---- (1) Observe /active_spawn — if another overlay instance created a
  // spawn we don't have locally yet (e.g. the debug button in a test browser,
  // while OBS is the second instance), render it here too.
  if (!wildSpawnState) {
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/active_spawn.json`);
      if (r.ok) {
        const current = await r.json();
        if (current && current.spawnId &&
            !current.winner &&
            Date.now() < (current.expiresAt || 0)) {
          const card = KANTO_CARDS.find(c => c.id === current.pokemonId);
          if (card) {
            wildSpawnState = current;
            renderWildSpawn(card, current);
            startResolutionPoll(current);
            dbgStatus(`Observed wild spawn: ${card.name}`);
          }
        }
      }
    } catch (e) {}
  }

  // ---- (2) Manual !spawn request flag
  try {
    const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/spawn_request.json`);
    if (!r.ok) return;
    const val = await r.json();
    if (val === true) {
      // Clear the request first so we don't re-trigger on the next poll
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/spawn_request.json`, { method: 'DELETE' });
      // forced=true so manual !spawn bypasses the auto-spawn session cap
      triggerWildSpawn(true);
    }
  } catch (e) {}
}

function startWildSpawnSystem() {
  const ws = wsConfig();
  if (!ws.enabled) {
    console.log('[wildspawn] disabled in config');
    return;
  }
  // Poll for manual !spawn requests every 3 seconds
  clearInterval(wildSpawnPollTimer);
  wildSpawnPollTimer = setInterval(pollSpawnRequest, 3000);
  // First auto-spawn — random delay within the first hour (configurable range)
  const firstDelay = ws.firstSpawnMinMs +
    Math.random() * (ws.firstSpawnMaxMs - ws.firstSpawnMinMs);
  setTimeout(() => triggerWildSpawn(false), firstDelay);
  console.log(`[wildspawn] system started — first spawn in ${Math.round(firstDelay / 60000)} min`);

  // Best-effort cleanup on page close/refresh. If THIS overlay created the
  // currently-active spawn (i.e. it's in our wildSpawnState), wipe the
  // /active_spawn entry from Firebase so a stale entry doesn't haunt us on
  // the next refresh. Uses sendBeacon for reliability during unload.
  window.addEventListener('beforeunload', () => {
    if (wildSpawnState && cfg.firebaseUrl) {
      try {
        const url = `${cfg.firebaseUrl.replace(/\/$/,'')}/active_spawn.json`;
        // navigator.sendBeacon doesn't support DELETE; do a synchronous fetch instead
        fetch(url, { method: 'DELETE', keepalive: true });
      } catch (e) {}
    }
  });
}

startWildSpawnSystem();

/* ============================================================
   DEBUG HELPERS (only visible with ?debug=1)
   ============================================================ */
function debugTrigger() {
  const u = document.getElementById('dbg-user').value || 'testviewer';
  const c = parseInt(document.getElementById('dbg-count').value) || 1;
  enqueueGift(u, c);
}
function debugShiny() { FORCE_NEXT_SHINY = true; dbgStatus('next pull will be shiny'); }
function debugLegendary() { FORCE_NEXT_LEGENDARY = true; dbgStatus('next pull will be legendary'); }
function debugShinyLegendary() { FORCE_NEXT_SHINY = true; FORCE_NEXT_LEGENDARY = true; dbgStatus('next pull: SHINY LEGENDARY ✨⚜'); }
function debugReset() {
  const u = userKey(document.getElementById('dbg-user').value || 'testviewer');
  localStorage.removeItem(`dex:${u}`);
  localStorage.removeItem(`credits:${u}`);
  dbgStatus(`wiped local dex + credits for ${u}`);
}
function debugSetCount(n) {
  const raw = document.getElementById('dbg-user').value || 'testviewer';
  const u = userKey(raw);
  const col = { _meta: { displayName: raw } };
  for (let i = 1; i <= n; i++) {
    col[i] = { id: i, shiny: false, name: KANTO_CARDS[i-1].name, at: Date.now() };
  }
  localStorage.setItem(`dex:${u}`, JSON.stringify(col));
  dbgStatus(`${u} now has ${n}/151 in local dex`);
}
async function debugCompletion() {
  const u = document.getElementById('dbg-user').value || 'testviewer';
  await celebrate(u);
}
function debugWildSpawn() {
  // Bypass the session cap and busy check for testing
  spawnsThisSession = 0;
  if (wildSpawnState) {
    dbgStatus('wild spawn already active — wait for it to resolve');
    return;
  }
  triggerWildSpawn();
}
async function debugWipeAll() {
  if (!confirm('WIPE ALL viewer data?\n\nThis deletes /collections, /credits and /completers from Firebase AND clears localStorage for every test viewer. Use this once after switching to the lowercase-key scheme. Cannot be undone.')) return;
  dbgStatus('wiping all viewer data…');
  try {
    await Store.wipeAll();
    dbgStatus('✓ all viewer data wiped — refresh the dex to confirm');
  } catch (e) {
    console.error(e);
    dbgStatus(`wipe failed: ${e.message}`);
  }
}
window.debugTrigger = debugTrigger;
window.debugShiny = debugShiny;
window.debugLegendary = debugLegendary;
window.debugShinyLegendary = debugShinyLegendary;
window.debugReset = debugReset;
window.debugSetCount = debugSetCount;
window.debugCompletion = debugCompletion;
window.debugWildSpawn = debugWildSpawn;
window.debugWipeAll = debugWipeAll;

// Hotkey for testing in a real browser (not OBS): press G to fire a test gift
window.addEventListener('keydown', (e) => {
  if (!DEBUG) return;
  if (e.key.toLowerCase() === 'g') debugTrigger();
  if (e.key.toLowerCase() === 's') debugShiny();
});
</script>
