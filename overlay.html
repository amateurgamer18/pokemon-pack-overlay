<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Pack Opening Overlay</title>
<style>
  /* ============================================================
     OBS BROWSER SOURCE — transparent background, no scrollbars
     Default canvas: 1920x1080. Animation centers itself.
     ============================================================ */
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ---------- Gifter banner (top of screen) ---------- */
  #banner {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-200%);
    background: linear-gradient(135deg, #ffcb05 0%, #f6a800 100%);
    color: #2a3b8f;
    font-weight: 800;
    font-size: 32px;
    padding: 16px 40px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5), 0 0 0 4px #2a3b8f, 0 0 0 8px #ffcb05;
    text-shadow: 2px 2px 0 rgba(255,255,255,.3);
    transition: transform .6s cubic-bezier(.34,1.56,.64,1);
    z-index: 10;
    text-align: center;
    line-height: 1.2;
  }
  #banner.show { transform: translateX(-50%) translateY(0); }
  #banner .sub { font-size: 18px; font-weight: 600; opacity: .85; margin-top: 4px; }

  /* ===================== WILD POKÉMON SPAWN ===================== */
  /* No card UI — the Pokémon itself is the focal point.
     Sprite is an animated GIF (PokeAPI Showdown mirror) that roams the
     bottom-third of the overlay. Flying-type Pokémon float higher and
     have a gentler vertical sway. */

  /* Drop-in announcement banner — anchored upper-left so it doesn't sit
     on top of gameplay or the webcam. Big but off to the side. */
  #wild-spawn-intro {
    position: fixed;
    top: 80px;
    left: 24px;
    z-index: 25;
    padding: 14px 28px;
    background: linear-gradient(135deg, rgba(34,170,80,.95), rgba(22,120,55,.98));
    color: #ffcb05;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 #000, 0 0 30px rgba(255,203,5,.6);
    border: 4px solid #ffcb05;
    border-radius: 14px;
    box-shadow: 0 16px 40px rgba(0,0,0,.6), 0 0 60px rgba(34,170,80,.5);
    text-align: left;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
  #wild-spawn-intro.show {
    animation: introDrop 1.2s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  #wild-spawn-intro.fade { animation: introFade .9s ease-in forwards; }
  @keyframes introDrop {
    0%   { transform: translateX(-120%) scale(.6) rotate(-6deg); opacity: 0; }
    60%  { transform: translateX(0) scale(1.06) rotate(1deg); opacity: 1; }
    100% { transform: translateX(0) scale(1) rotate(0); opacity: 1; }
  }
  @keyframes introFade {
    0%   { opacity: 1; transform: translateX(0) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(.8); }
  }

  /* The roaming Pokémon sprite itself.
     Ground walkers stay centered above the sub-goal banner area (roughly the
     same horizontal width as the banner itself, ~25vw to ~65vw).
     Flying types get FULL freedom of the screen — they can soar anywhere. */
  #wild-spawn-sprite {
    position: fixed;
    bottom: 175px;
    left: 25vw;
    width: 110px;
    height: 110px;
    z-index: 20;
    pointer-events: none;
    transition: opacity .4s;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,.6));
  }
  #wild-spawn-sprite img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated; /* keep the GIF crisp at large size */
  }
  /* Ground-walker path — centered along the bottom, same width as sub-goal banner */
  #wild-spawn-sprite.walking {
    animation: walkPath 13s ease-in-out infinite;
  }
  @keyframes walkPath {
    0%   { left: 25vw; transform: scaleX(1); }
    45%  { left: 65vw; transform: scaleX(1); }
    50%  { left: 65vw; transform: scaleX(-1); }
    95%  { left: 25vw; transform: scaleX(-1); }
    100% { left: 25vw; transform: scaleX(1); }
  }
  /* TRUE flying — Pokémon soars across the FULL screen with dramatic
     figure-eight swoops, climbs, dives, and body rotation. */
  #wild-spawn-sprite.flying {
    bottom: 30%;
    animation: flySwoop 18s ease-in-out infinite;
  }
  @keyframes flySwoop {
    0%   { left: -10vw; bottom: 25%; transform: scaleX(1) rotate(-6deg); }
    14%  { left: 18vw;  bottom: 60%; transform: scaleX(1) rotate(-20deg); }
    28%  { left: 42vw;  bottom: 30%; transform: scaleX(1) rotate(25deg); }
    42%  { left: 72vw;  bottom: 65%; transform: scaleX(1) rotate(-15deg); }
    52%  { left: 95vw;  bottom: 40%; transform: scaleX(1) rotate(0); }
    56%  { left: 95vw;  bottom: 40%; transform: scaleX(-1) rotate(0); }
    66%  { left: 70vw;  bottom: 70%; transform: scaleX(-1) rotate(18deg); }
    78%  { left: 45vw;  bottom: 35%; transform: scaleX(-1) rotate(-22deg); }
    90%  { left: 18vw;  bottom: 55%; transform: scaleX(-1) rotate(15deg); }
    100% { left: -10vw; bottom: 25%; transform: scaleX(-1) rotate(-6deg); }
  }
  /* Catch — sprite flashes white on impact, then spirals into the pokéball.
     Choreographed in lockstep with the pokéball's catchSequence below. */
  #wild-spawn-sprite.absorbing {
    animation: absorbInto 2.8s linear forwards !important;
  }
  @keyframes absorbInto {
    /* Idle while ball is flying in (0-22%, ~620ms) */
    0%, 22%  { transform: scale(1) rotate(0); opacity: 1;
               filter: drop-shadow(0 6px 12px rgba(0,0,0,.6)); }
    /* Impact flash (22-28%) — sprite goes white-hot */
    25%      { transform: scale(1.18) rotate(0); opacity: 1; filter: brightness(5) saturate(2); }
    28%      { transform: scale(1) rotate(60deg); opacity: 1; filter: brightness(2.5); }
    /* Suck-in spiral (28-42%) */
    35%      { transform: scale(.5) rotate(220deg); opacity: .9;
               filter: brightness(2) drop-shadow(0 0 24px #ee1515); }
    42%      { transform: scale(.05) rotate(440deg); opacity: 0; filter: brightness(1.5); }
    /* Stay gone for the wiggle + confirm phase */
    100%     { transform: scale(0); opacity: 0; }
  }
  /* Flee — sprite slumps and runs/flies off in the direction it was facing */
  #wild-spawn-sprite.fled {
    animation: fleeOff .9s ease-in forwards !important;
    opacity: .6;
  }
  @keyframes fleeOff {
    0%   { transform: translateX(0) scale(1); opacity: 1; }
    100% { transform: translateX(-50vw) scale(.4); opacity: 0; }
  }

  /* Pulsing chat hint — bottom-center, just above the sub-goal banner */
  #wild-spawn-hint {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 22;
    background: rgba(0,0,0,.82);
    color: #fff;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    padding: 8px 22px;
    border: 3px solid #ffcb05;
    border-radius: 100px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.6);
    box-shadow: 0 0 24px rgba(255,203,5,.45), 0 6px 18px rgba(0,0,0,.5);
    white-space: nowrap;
    animation: hintPulse 1.4s ease-in-out infinite;
  }
  #wild-spawn-hint strong { color: #ffcb05; }
  @keyframes hintPulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50%      { transform: translateX(-50%) scale(1.06); }
  }

  /* Floating status — appears centered, above where the ground walker patrols */
  #wild-spawn-status {
    position: fixed;
    bottom: 320px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 23;
    color: #fff;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 26px;
    letter-spacing: 1.5px;
    text-shadow: 3px 3px 0 #000, 0 0 16px rgba(0,0,0,.8);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .3s ease, transform .3s ease;
    pointer-events: none;
  }
  #wild-spawn-status.show {
    opacity: 1;
    animation: statusFlash 1.8s ease-out forwards;
  }
  @keyframes statusFlash {
    0%   { transform: translateX(-50%) translateY(20px) scale(.6); opacity: 0; }
    25%  { transform: translateX(-50%) translateY(0)    scale(1.15); opacity: 1; }
    75%  { transform: translateX(-50%) translateY(-6px) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-22px) scale(.95); opacity: 0; }
  }
  /* Longer hold variant for the catch celebration — viewers need time to read */
  #wild-spawn-status.show-long {
    opacity: 1;
    animation: statusFlashLong 5s ease-out forwards;
  }
  @keyframes statusFlashLong {
    0%   { transform: translateX(-50%) translateY(20px) scale(.6); opacity: 0; }
    8%   { transform: translateX(-50%) translateY(0)    scale(1.18); opacity: 1; }
    14%  { transform: translateX(-50%) translateY(0)    scale(1); opacity: 1; }
    90%  { transform: translateX(-50%) translateY(0)    scale(1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-22px) scale(.95); opacity: 0; }
  }

  /* Pokéball — full OG-style catch sequence: throw → impact → drop → wiggle ×3 → confirm.
     Element is positioned via inline style (left/top) at the sprite's center
     when the catch starts, then this 2.8-second keyframe animation plays. */
  #pokeball-throw {
    position: fixed;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    z-index: 21;
    /* Layered for 3D sphere look:
       1. Top-left specular highlight (lit from above-left)
       2. Black horizontal divide line through middle
       3. Red top hemisphere — radial darkening at edges for sphere depth
       4. White bottom hemisphere — same treatment */
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.85) 0%, rgba(255,255,255,.15) 18%, transparent 38%),
      linear-gradient(180deg, transparent calc(50% - 4px), #000 calc(50% - 4px), #000 calc(50% + 4px), transparent calc(50% + 4px)),
      radial-gradient(ellipse at 50% 100%, #ff5050 0%, #d31616 55%, #7a0a0a 100%) top/100% 50% no-repeat,
      radial-gradient(ellipse at 50% 0%,   #ffffff 0%, #dadada 55%, #707070 100%) bottom/100% 50% no-repeat;
    border: 2.5px solid #000;
    /* Inner shading + outer drop shadow for 3D sphere illusion */
    box-shadow:
      inset -7px -7px 14px rgba(0,0,0,.45),
      inset 5px 5px 12px rgba(255,255,255,.3),
      0 12px 26px rgba(0,0,0,.7);
    pointer-events: none;
    display: none;
  }
  #pokeball-throw::after {
    /* Center button — 3D pressed-in look with its own highlight */
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 20px; height: 20px;
    margin: -10px 0 0 -10px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.95) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, #fff 0%, #dcdcdc 65%, #909090 100%);
    border: 2px solid #000;
    box-shadow:
      inset -1.5px -1.5px 3px rgba(0,0,0,.4),
      inset 1.5px 1.5px 2px rgba(255,255,255,.6);
    z-index: 2;
  }

  /* OPENING FLASH — the white capture beam erupting from the ball at impact.
     Positioned at the same coords as the ball (Pokémon location) when the
     catch starts. Stays hidden until the ball lands, then explodes outward
     in a bright white burst that engulfs the Pokémon. */
  #pokeball-flash {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: white;
    z-index: 22;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    animation: openFlash 2.8s ease-out forwards;
  }
  @keyframes openFlash {
    /* Hidden while the ball is flying in (0-20%) */
    0%, 20% { transform: translate(-50%, -50%) scale(0); opacity: 0; box-shadow: none; }
    /* IMPACT! Ball opens, blast of white light (22-26%) */
    22%     { transform: translate(-50%, -50%) scale(25); opacity: 1;
              box-shadow: 0 0 80px 40px rgba(255,255,255,.95),
                          0 0 160px 60px rgba(255,255,255,.6); }
    26%     { transform: translate(-50%, -50%) scale(35); opacity: .9;
              box-shadow: 0 0 60px 30px rgba(255,255,255,.7),
                          0 0 120px 50px rgba(255,255,255,.4); }
    /* Beam shrinks back as Pokémon gets absorbed (26-44%) */
    34%     { transform: translate(-50%, -50%) scale(20); opacity: .6;
              box-shadow: 0 0 30px 15px rgba(255,255,255,.4); }
    44%     { transform: translate(-50%, -50%) scale(4); opacity: 0;
              box-shadow: 0 0 0 0 transparent; }
    /* Stay invisible for wiggle + confirm phases */
    100%    { opacity: 0; }
  }
  #pokeball-throw.catchsequence {
    display: block;
    animation: catchSequence 2.8s ease-out forwards;
  }
  @keyframes catchSequence {
    /* PHASE 1 — Ball flies in from the right, spinning hard (0-22%, ~620ms) */
    0%    { transform: translate(70vw, -25vh) rotate(0) scale(.4); opacity: 0; }
    6%    { opacity: 1; }
    16%   { transform: translate(35vw, -10vh) rotate(360deg) scale(.9); opacity: 1; }
    22%   { transform: translate(0, 0)       rotate(720deg) scale(1.35); opacity: 1;
            filter: brightness(2) drop-shadow(0 0 12px #fff); }
    /* PHASE 2 — Hold + absorb (22-45%) */
    28%   { transform: translate(0, 0) rotate(720deg) scale(1); filter: brightness(1); }
    45%   { transform: translate(0, 0) rotate(720deg) scale(1); }
    /* PHASE 3 — Ball drops to "ground" with a small bounce (45-58%) */
    52%   { transform: translate(0, 56px) rotate(740deg) scale(1); }
    55%   { transform: translate(0, 46px) rotate(745deg) scale(1.05); } /* tiny bounce */
    58%   { transform: translate(0, 56px) rotate(740deg) scale(1); }
    /* PHASE 4 — WIGGLE ×3 (58-88%) — left, right, left, right, left, settle */
    62%   { transform: translate(-14px, 56px) rotate(715deg) scale(1); }
    67%   { transform: translate(14px,  56px) rotate(765deg) scale(1); }
    72%   { transform: translate(-12px, 56px) rotate(720deg) scale(1); }
    77%   { transform: translate(12px,  56px) rotate(760deg) scale(1); }
    82%   { transform: translate(-8px,  56px) rotate(730deg) scale(1); }
    87%   { transform: translate(0,     56px) rotate(740deg) scale(1); }
    /* PHASE 5 — Catch confirmed! Pulse + gold halo (87-100%) */
    92%   { transform: translate(0, 56px) rotate(740deg) scale(1.3);
            filter: drop-shadow(0 0 32px #ffcb05) brightness(1.4); }
    100%  { transform: translate(0, 56px) rotate(740deg) scale(1);
            filter: drop-shadow(0 0 18px #ffcb05); }
  }

  /* ---------- Pack & Card container ---------- */
  .scene {
    width: 480px;
    height: 680px;
    position: relative;
    perspective: 1600px;
    transform-style: preserve-3d;
  }

  /* ---------- Pack (spins in on entrance) ---------- */
  .pack {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background:
      radial-gradient(circle at 50% 75%, rgba(255,255,255,.12) 0%, transparent 60%),
      linear-gradient(180deg, #d83f3f 0%, #b81e1e 50%, #8b1414 100%);
    box-shadow:
      inset 0 0 40px rgba(0,0,0,.4),
      0 20px 60px rgba(0,0,0,.6);
    overflow: hidden;
    transform-origin: center center;
    transform: rotateY(-720deg) scale(.7);
    transition: transform 1.6s cubic-bezier(.34, 1.1, .58, 1);
  }
  .scene.enter .pack {
    transform: rotateY(0deg) scale(1);
  }
  .pack-foil {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(115deg, transparent 0px, transparent 8px, rgba(255,255,255,.05) 8px, rgba(255,255,255,.05) 16px);
    mix-blend-mode: overlay;
  }
  .pack-logo {
    position: absolute;
    top: 90px;
    left: 0; right: 0;
    text-align: center;
    color: #ffcb05;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -2px;
    text-shadow:
      -3px -3px 0 #2a3b8f, 3px -3px 0 #2a3b8f,
      -3px 3px 0 #2a3b8f, 3px 3px 0 #2a3b8f,
       0 8px 0 #1a2966, 0 12px 24px rgba(0,0,0,.6);
    transform: rotate(-4deg);
    font-family: 'Impact', 'Arial Black', sans-serif;
  }
  .pack-logo .sub {
    display: block;
    margin-top: 8px;
    font-size: 22px;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 2px 2px 0 #2a3b8f;
    transform: rotate(0deg);
  }
  .pokeball {
    position: absolute;
    left: 50%; top: 58%;
    width: 220px; height: 220px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      linear-gradient(180deg, #ee1515 0%, #ee1515 49%, #222 49%, #222 51%, #f0f0f0 51%, #f0f0f0 100%);
    box-shadow:
      inset -10px -10px 30px rgba(0,0,0,.3),
      inset 8px 8px 20px rgba(255,255,255,.2),
      0 6px 20px rgba(0,0,0,.4);
  }
  .pokeball::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 60px; height: 60px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #f0f0f0;
    box-shadow:
      inset -3px -3px 6px rgba(0,0,0,.2),
      0 0 0 8px #222,
      0 0 0 12px #f0f0f0;
  }
  .pack-stripe {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    background:
      linear-gradient(180deg, #ffcb05 0%, #f6a800 100%);
    box-shadow:
      0 4px 0 0 #2a3b8f inset,
      0 -4px 0 0 #2a3b8f inset;
  }
  .pack-stripe.top { top: 50px; }
  .pack-stripe.bot { bottom: 50px; }

  /* Pack cut line at top — animated rip */
  .pack-cut {
    position: absolute;
    top: 24px;
    left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, #fff 0 8px, transparent 8px 16px);
    opacity: 0;
  }

  /* Pack opens: top half EXPLODES off with white fireworks */
  .pack-top, .pack-bot {
    position: absolute;
    left: 0; right: 0;
    overflow: hidden;
    transform-style: preserve-3d;
  }
  .pack-top {
    top: 0;
    height: 30%;
    transform-origin: bottom center;
  }
  .pack-bot {
    bottom: 0;
    height: 70%;
    transform-origin: top center;
  }
  /* Explosion — top blasts upward with rotation, opacity rapidly fades */
  .scene.exploded .pack-top {
    animation: packTopExplode 1.1s cubic-bezier(.2, .8, .4, 1) forwards;
  }
  @keyframes packTopExplode {
    0%   { transform: translateY(0) rotate(0deg) scale(1);    opacity: 1; }
    20%  { transform: translateY(-30px) rotate(-3deg) scale(1.06); opacity: 1; }
    50%  { transform: translateY(-280px) rotate(15deg) scale(.85); opacity: .9; }
    100% { transform: translateY(-700px) rotate(45deg) scale(.55); opacity: 0; }
  }
  /* Pack bottom recoils slightly and fades a touch */
  .scene.exploded .pack-bot {
    animation: packBotRecoil 1.1s cubic-bezier(.34, 1.4, .64, 1) forwards;
  }
  @keyframes packBotRecoil {
    0%   { transform: translateY(0)    rotate(0deg); }
    15%  { transform: translateY(18px) rotate(.5deg); }
    100% { transform: translateY(10px) rotate(0deg); opacity: .85; }
  }

  /* Explosion sparks — burst outward from the rip line */
  .pack-burst {
    position: absolute;
    top: 30%;
    left: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
    z-index: 6;
  }
  .pack-burst .spark {
    position: absolute;
    left: 0; top: 0;
    width: 14px; height: 14px;
    background: radial-gradient(circle, white 0%, #fff8c8 35%, rgba(255,220,120,.6) 60%, transparent 80%);
    border-radius: 50%;
    opacity: 0;
    box-shadow: 0 0 16px white, 0 0 32px rgba(255,240,180,.7);
  }
  .scene.exploded .pack-burst .spark {
    animation: sparkFly 1.1s cubic-bezier(.2, .7, .4, 1) forwards;
  }
  @keyframes sparkFly {
    0%   { transform: translate(-50%, -50%) scale(0);                opacity: 1; }
    20%  { transform: translate(calc(-50% + var(--dx) * .25), calc(-50% + var(--dy) * .25)) scale(1.4); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.3); opacity: 0; }
  }
  /* For shiny pulls — sparks gain a rainbow tint */
  .scene.shiny-pull .pack-burst .spark {
    background: radial-gradient(circle, white 0%, #ffe4ff 30%, rgba(255,170,255,.7) 60%, transparent 80%);
    box-shadow: 0 0 16px #fff, 0 0 36px rgba(255, 0, 255, .7);
  }

  /* ---------- Card (flat, no 3D flipping — front stays hidden via opacity) ---------- */
  .card {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 380px;
    height: 530px;
    transform: translate(-50%, -50%) translateY(120px) scale(.85);
    opacity: 0;
    transition: opacity .4s ease-out, transform 1.2s cubic-bezier(.34,1.56,.64,1);
    border-radius: 18px;
    will-change: transform;
  }
  .scene.opened .card {
    opacity: 1;
    transform: translate(-50%, -50%) translateY(-30px) scale(1);
  }

  /* Charging — slow breathing pulse */
  .scene.charging .card {
    animation: cardBreathe 1.4s ease-in-out infinite;
  }
  @keyframes cardBreathe {
    0%, 100% { transform: translate(-50%, -50%) translateY(-30px) scale(1);    }
    50%      { transform: translate(-50%, -50%) translateY(-30px) scale(1.06); }
  }

  /* Vibrating — fast nervous shake */
  .scene.vibrating .card {
    animation: cardShake .055s linear infinite;
  }
  @keyframes cardShake {
    0%   { transform: translate(-50%, -50%) translateY(-30px) translate(-4px,-2px) scale(1.06); }
    25%  { transform: translate(-50%, -50%) translateY(-30px) translate(3px,2px)   scale(1.06); }
    50%  { transform: translate(-50%, -50%) translateY(-30px) translate(-2px,3px)  scale(1.06); }
    75%  { transform: translate(-50%, -50%) translateY(-30px) translate(4px,-3px)  scale(1.06); }
    100% { transform: translate(-50%, -50%) translateY(-30px) translate(0,0)       scale(1.06); }
  }

  /* Reveal — dramatic scale bounce (cross-fade handled on .card-back/.card-front) */
  .scene.revealed .card {
    animation: cardRevealBounce .85s cubic-bezier(.34,1.6,.64,1) forwards;
  }
  @keyframes cardRevealBounce {
    0%   { transform: translate(-50%, -50%) translateY(-30px) scale(1.06); }
    35%  { transform: translate(-50%, -50%) translateY(-80px) scale(1.28); }
    100% { transform: translate(-50%, -50%) translateY(-40px) scale(1.12); }
  }

  /* Subtle float during the reveal hold phase */
  .scene.revealed.settled .card {
    animation: cardFloat 3s ease-in-out infinite;
  }
  @keyframes cardFloat {
    0%, 100% { transform: translate(-50%, -50%) translateY(-40px) scale(1.12); }
    50%      { transform: translate(-50%, -50%) translateY(-55px) scale(1.12); }
  }
  /* Shinies float + sway + breathe — adds "alive" feel without changing the sprite */
  .scene.shiny-pull.revealed.settled .card {
    animation: cardFloatShiny 4.5s ease-in-out infinite;
  }
  @keyframes cardFloatShiny {
    0%, 100% { transform: translate(-50%, -50%) translateY(-40px) scale(1.12) rotate(-1.8deg); }
    25%      { transform: translate(-50%, -50%) translateY(-50px) scale(1.135) rotate(0deg); }
    50%      { transform: translate(-50%, -50%) translateY(-58px) scale(1.12) rotate(1.8deg); }
    75%      { transform: translate(-50%, -50%) translateY(-50px) scale(1.135) rotate(0deg); }
  }
  /* Legendaries float bigger, rotate slower, larger scale — feels heavier and more "important" */
  .scene.legendary-pull.revealed.settled .card {
    animation: cardFloatLegendary 5.5s ease-in-out infinite !important;
  }
  @keyframes cardFloatLegendary {
    0%, 100% { transform: translate(-50%, -50%) translateY(-50px) scale(1.16) rotate(-2.5deg); }
    25%      { transform: translate(-50%, -50%) translateY(-62px) scale(1.18)  rotate(0deg); }
    50%      { transform: translate(-50%, -50%) translateY(-70px) scale(1.16) rotate(2.5deg); }
    75%      { transform: translate(-50%, -50%) translateY(-62px) scale(1.18)  rotate(0deg); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    overflow: hidden;
    transition: opacity .45s ease-out, transform .55s cubic-bezier(.34,1.6,.64,1);
  }
  /* Back is visible by default; front is hidden until reveal (NO peek possible) */
  .card-back  { opacity: 1; transform: scale(1); }
  .card-front { opacity: 0; transform: scale(.85); }

  /* At reveal: back disintegrates outward, front materialises inward */
  .scene.revealed .card-back  { opacity: 0; transform: scale(1.45); }
  .scene.revealed .card-front { opacity: 1; transform: scale(1); transition-delay: .18s; }

  /* ============================================================
     Card back — CSS recreation of the classic Pokémon TCG back
     (blue swirl + Pokéball + top & bottom mirrored POKÉMON logo).
     If config.cardBackImageUrl is set, the JS swaps this for a
     plain <img> instead.
     ============================================================ */
  .card-back {
    background:
      /* central highlight that makes the swirl look glossy */
      radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255,255,255,.15) 0%, transparent 60%),
      /* the swirl: concentric tinted bands */
      conic-gradient(from 30deg at 50% 50%,
        #2a4fa8 0deg, #4a78d8 45deg, #2a4fa8 90deg, #5887e8 135deg,
        #2a4fa8 180deg, #4a78d8 225deg, #2a4fa8 270deg, #5887e8 315deg, #2a4fa8 360deg),
      radial-gradient(circle at 50% 50%, #4a78d8 0%, #2a4fa8 60%, #15296e 100%);
    background-blend-mode: overlay, screen, normal;
    border: 14px solid #1a2966;
    box-shadow: 0 0 0 3px #ffcb05 inset, 0 20px 40px rgba(0,0,0,.5);
    overflow: hidden;
    /* position is inherited from .card-face (absolute + inset:0) so the
       card-back fills the full 380x530 card frame */
  }
  /* swirly cloud texture overlay using diagonal repeating gradient */
  .card-back::before {
    content: '';
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(ellipse 60% 40% at 30% 40%, rgba(255,255,255,.18) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 70% 60%, rgba(255,255,255,.18) 0%, transparent 50%),
      radial-gradient(ellipse 50% 30% at 20% 75%, rgba(255,255,255,.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 25%, rgba(255,255,255,.12) 0%, transparent 60%);
    pointer-events: none;
  }
  /* The big yellow POKÉMON wordmark at top */
  .card-back .logo-top,
  .card-back .logo-bot {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    color: #ffd000;
    text-shadow:
      -3px -3px 0 #2a3b8f, 3px -3px 0 #2a3b8f,
      -3px 3px 0 #2a3b8f, 3px 3px 0 #2a3b8f,
       0 6px 0 #1a2966, 0 8px 12px rgba(0,0,0,.5);
    transform: skewX(-8deg);
    z-index: 2;
  }
  .card-back .logo-top { top: 30px; }
  .card-back .logo-bot {
    bottom: 30px;
    transform: skewX(-8deg) rotate(180deg);
  }
  /* The Pokéball in the centre */
  .card-back .pokeball-back {
    position: absolute;
    left: 50%; top: 50%;
    width: 180px; height: 180px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      linear-gradient(180deg, #ee1515 0%, #ee1515 49%, #222 49%, #222 51%, #f4f4f4 51%, #f4f4f4 100%);
    box-shadow:
      inset -14px -14px 36px rgba(0,0,0,.45),
      inset 10px 10px 24px rgba(255,255,255,.35),
      0 6px 20px rgba(0,0,0,.5),
      0 0 0 4px #1a2966;
  }
  .card-back .pokeball-back::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 50px; height: 50px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #fafafa;
    box-shadow:
      inset -3px -3px 6px rgba(0,0,0,.2),
      0 0 0 7px #222,
      0 0 0 10px #fafafa;
  }
  /* If a custom image URL was supplied via config */
  .card-back.has-image {
    background: none;
    border: none;
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
  }
  .card-back.has-image::before,
  .card-back.has-image .logo-top,
  .card-back.has-image .logo-bot,
  .card-back.has-image .pokeball-back { display: none; }
  .card-back.has-image .back-image {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 6px;
  }

  /* Card front (TCG-styled) */
  .card-front {
    --type-bg: #A8A878;
    --type-border: #6D6D4E;
    --type-text: #fff;
    background: linear-gradient(180deg, #fff8d5 0%, #fde9a1 100%);
    border: 14px solid #ffcb05;
    box-shadow:
      0 0 0 3px #c79500 inset,
      0 20px 40px rgba(0,0,0,.5);
    padding: 14px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }
  .card-front .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    color: #1a1a1a;
    margin-bottom: 6px;
    padding: 0 4px;
  }
  .card-front .name {
    font-size: 26px;
    font-weight: 900;
    text-shadow: 2px 2px 0 #fff;
    letter-spacing: -.5px;
  }
  .card-front .hp {
    font-size: 22px;
    font-weight: 800;
    color: #c00;
    text-shadow: 1px 1px 0 #fff;
  }
  .card-front .hp .num { font-size: 28px; }

  .card-front .art {
    flex: 1;
    background: linear-gradient(180deg, #a8d8f8 0%, #6890f0 60%, #4a78d0 100%);
    border: 6px solid var(--type-border);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-front .art img {
    width: 92%;
    height: 92%;
    object-fit: contain;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,.4));
  }
  .card-front .art .type-badge {
    position: absolute;
    top: 8px; right: 8px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--type-bg);
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--type-text);
    font-weight: 900;
    font-size: 11px;
    text-transform: uppercase;
  }

  .card-front .footer {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(0,0,0,.06);
    border-radius: 4px;
    color: #333;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-front .footer .dex { font-weight: 700; }
  .card-front .footer .rarity {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .card-front .rarity .star {
    color: #ffcb05;
    text-shadow: 1px 1px 0 #c79500;
    font-size: 16px;
  }

  /* Holo shimmer overlay (always present on standard cards, subtle) */
  .card-front::before {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 6px;
    background: linear-gradient(115deg,
      transparent 30%,
      rgba(255,255,255,.4) 50%,
      transparent 70%);
    background-size: 200% 200%;
    background-position: -100% -100%;
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity .4s;
  }
  .scene.revealed .card-front::before {
    opacity: 1;
    animation: shimmer 2.2s ease-in-out;
  }
  @keyframes shimmer {
    0%   { background-position: -100% -100%; opacity: 0; }
    50%  { opacity: 1; }
    100% { background-position: 200% 200%; opacity: 0; }
  }

  /* SHINY variant — rainbow holo full overlay + name color shift + RGB border */
  .card-front.shiny {
    background: linear-gradient(180deg, #fff 0%, #f0f0ff 100%);
    animation: rgbBorder 3.5s linear infinite;
  }
  @keyframes rgbBorder {
    0%   {
      border-color: #ff00ff;
      box-shadow: 0 0 0 3px #ff00ff inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,0,255,.6);
    }
    20%  {
      border-color: #ffaa00;
      box-shadow: 0 0 0 3px #ffaa00 inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,170,0,.6);
    }
    40%  {
      border-color: #ffff00;
      box-shadow: 0 0 0 3px #ffff00 inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,255,0,.55);
    }
    60%  {
      border-color: #00ff88;
      box-shadow: 0 0 0 3px #00ff88 inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(0,255,136,.55);
    }
    80%  {
      border-color: #00ddff;
      box-shadow: 0 0 0 3px #00ddff inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(0,221,255,.6);
    }
    100% {
      border-color: #ff00ff;
      box-shadow: 0 0 0 3px #ff00ff inset, 0 20px 40px rgba(0,0,0,.5), 0 0 50px rgba(255,0,255,.6);
    }
  }
  .card-front.shiny::after {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 6px;
    background: conic-gradient(
      from 0deg,
      #ff00ff, #ff8800, #ffff00, #00ff88, #00ffff, #0088ff, #ff00ff
    );
    background-size: 200% 200%;
    mix-blend-mode: color-dodge;
    opacity: .35;
    pointer-events: none;
    animation: rainbowSpin 6s linear infinite;
  }
  @keyframes rainbowSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Continuous holographic light sweep — simulates overhead-light reflection
     on a real holo card. Sweeps a bright diagonal band across the surface. */
  .scene.revealed .card-front.shiny::before {
    opacity: 1;
    background: linear-gradient(115deg,
      transparent 30%,
      rgba(255, 255, 255, .55) 47%,
      rgba(255, 220, 255, .6) 50%,
      rgba(200, 240, 255, .55) 53%,
      transparent 70%);
    background-size: 250% 250%;
    background-position: -150% 0%;
    animation: holoSweep 2.6s linear infinite !important;
    mix-blend-mode: overlay;
  }
  @keyframes holoSweep {
    0%   { background-position: -150% 0%; }
    100% { background-position:  150% 0%; }
  }
  .card-front.shiny .name {
    background: linear-gradient(90deg, #ff00aa, #ffaa00, #00ddff, #aa00ff);
    background-size: 200% 100%;
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    animation: rainbowText 3s linear infinite;
    text-shadow: none;
  }
  @keyframes rainbowText {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .card-front.shiny .footer .rarity .star {
    color: #ff00ff;
    text-shadow: 0 0 6px #ff00ff;
  }

  /* ============================================================
     LEGENDARY variant — gold frame, shimmer border, 5 stars
     ============================================================ */
  .card-front.legendary {
    background: linear-gradient(180deg, #fff8d0 0%, #f0d878 70%, #d4a82c 100%);
    border: 14px solid #d4a82c;
    box-shadow:
      0 0 0 3px #b8860b inset,
      0 0 0 6px #fff6b8 inset,
      0 20px 50px rgba(0,0,0,.6),
      0 0 80px rgba(255,200,40,.7);
    animation: legendaryBorder 4.5s linear infinite;
  }
  @keyframes legendaryBorder {
    0%, 100% {
      border-color: #d4a82c;
      box-shadow:
        0 0 0 3px #b8860b inset,
        0 0 0 6px #fff6b8 inset,
        0 20px 50px rgba(0,0,0,.6),
        0 0 80px rgba(255,200,40,.7);
    }
    50% {
      border-color: #fff0a0;
      box-shadow:
        0 0 0 3px #d4a82c inset,
        0 0 0 6px #ffffff inset,
        0 20px 50px rgba(0,0,0,.6),
        0 0 120px rgba(255,220,80,.95);
    }
  }
  /* Slow rotating gold conic-gradient on the inside (replaces shiny rainbow) */
  .card-front.legendary::after {
    content: '';
    position: absolute;
    inset: 14px;
    border-radius: 6px;
    background: conic-gradient(
      from 0deg,
      #ffd700, #fff4a0, #ffb800, #ffe680, #ffd700, #fff4a0, #ffb800, #ffd700
    );
    background-size: 200% 200%;
    mix-blend-mode: overlay;
    opacity: .45;
    pointer-events: none;
    animation: rainbowSpin 8s linear infinite;
  }
  /* Shimmering diagonal gold streak that sweeps across continuously */
  .scene.revealed .card-front.legendary::before {
    opacity: 1;
    background: linear-gradient(115deg,
      transparent 25%,
      rgba(255, 240, 180, .65) 47%,
      rgba(255, 255, 230, .8) 50%,
      rgba(255, 220, 120, .65) 53%,
      transparent 75%);
    background-size: 250% 250%;
    background-position: -150% 0%;
    animation: holoSweep 3.4s linear infinite !important;
    mix-blend-mode: overlay;
  }
  /* Gold name with subtle glow */
  .card-front.legendary .name {
    background: linear-gradient(180deg, #fff7c8 0%, #f0c020 60%, #b8860b 100%);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    text-shadow: 0 0 8px rgba(255,200,40,.5);
  }
  .card-front.legendary .footer .rarity .star {
    color: #ffd700;
    text-shadow: 0 0 8px #ffd700, 0 0 16px rgba(255,200,40,.7);
  }

  /* If a card is BOTH shiny AND legendary, layer the shiny holo over the gold */
  .card-front.shiny.legendary {
    /* shiny's RGB border wins (it's also animated), but keep the gold inset glow */
    box-shadow: 0 0 0 3px #d4a82c inset, 0 0 0 6px #ffffff inset, 0 20px 50px rgba(0,0,0,.6), 0 0 90px rgba(255,220,80,.85);
  }

  /* Sparkle particles for shiny reveal */
  .sparkles {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    opacity: 0;
  }
  .scene.revealed .sparkles { opacity: 1; }
  .sparkle {
    position: absolute;
    width: 14px; height: 14px;
    background:
      radial-gradient(circle, #fff 0%, #ffcb05 30%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
  }
  .scene.revealed .sparkle {
    animation: sparkleBurst 1.6s ease-out forwards;
  }
  @keyframes sparkleBurst {
    0%   { transform: translate(0,0) scale(0); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 0; }
  }

  /* ---------- New badge ---------- */
  .new-badge {
    position: absolute;
    top: -18px;
    right: -18px;
    background: linear-gradient(135deg, #ff3366 0%, #cc0044 100%);
    color: #fff;
    font-weight: 900;
    font-size: 18px;
    padding: 10px 18px;
    border-radius: 100px;
    transform: rotate(15deg) scale(0);
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    text-shadow: 1px 1px 0 rgba(0,0,0,.3);
    z-index: 5;
    transition: transform .5s cubic-bezier(.34,1.56,.64,1) .4s;
  }
  .scene.revealed .new-badge.show { transform: rotate(15deg) scale(1); }

  /* Scene entrance/exit */
  .scene {
    opacity: 0;
    transform: scale(.6);
    transition: opacity .5s, transform .5s cubic-bezier(.34,1.56,.64,1);
  }
  .scene.enter {
    opacity: 1;
    transform: scale(1);
  }
  .scene.exit {
    opacity: 0;
    transform: scale(.85) translateY(40px);
    transition: opacity .8s, transform .8s ease-in;
  }

  /* ============================================================
     NEW DRAMATIC EFFECTS — aura, flash, shockwave, light rays
     ============================================================ */

  /* Aura — glowing halo around the card during charge & vibrate */
  .aura {
    position: absolute;
    left: 50%; top: 50%;
    width: 380px; height: 530px;
    transform: translate(-50%, -50%) translateY(-30px);
    border-radius: 18px;
    pointer-events: none;
    opacity: 0;
    z-index: -1;
    transition: opacity .8s ease-out;
  }
  .scene.opened .aura { opacity: .4; }
  .scene.charging .aura {
    opacity: 1;
    animation: auraPulse 1.4s ease-in-out infinite;
  }
  .scene.vibrating .aura {
    opacity: 1;
    animation: auraPulseFast .22s ease-in-out infinite;
  }
  @keyframes auraPulse {
    0%, 100% {
      box-shadow:
        0 0 50px 18px var(--aura-color, #ffcb05),
        0 0 120px 40px var(--aura-color, #ffcb05);
      filter: brightness(1);
    }
    50% {
      box-shadow:
        0 0 90px 35px var(--aura-color, #ffcb05),
        0 0 200px 80px var(--aura-color, #ffcb05);
      filter: brightness(1.5);
    }
  }
  @keyframes auraPulseFast {
    0%, 100% {
      box-shadow:
        0 0 80px 30px var(--aura-color, #ffcb05),
        0 0 180px 70px var(--aura-color, #ffcb05);
      filter: brightness(1.5);
    }
    50% {
      box-shadow:
        0 0 130px 55px var(--aura-color, #ffcb05),
        0 0 260px 120px var(--aura-color, #ffcb05);
      filter: brightness(2.2);
    }
  }
  /* Shiny variant — rainbow aura that cycles colors */
  .scene.shiny-pull .aura {
    animation: auraRainbowSlow 2.2s linear infinite, auraPulse 1.4s ease-in-out infinite !important;
  }
  .scene.shiny-pull.vibrating .aura {
    animation: auraRainbow 0.6s linear infinite, auraPulseFast .22s ease-in-out infinite !important;
  }
  @keyframes auraRainbow {
    0%   { --aura-color: #ff00ff; }
    25%  { --aura-color: #ffaa00; }
    50%  { --aura-color: #00ddff; }
    75%  { --aura-color: #aaff00; }
    100% { --aura-color: #ff00ff; }
  }
  @keyframes auraRainbowSlow {
    0%   { --aura-color: #ff00ff; }
    25%  { --aura-color: #ffaa00; }
    50%  { --aura-color: #00ddff; }
    75%  { --aura-color: #aaff00; }
    100% { --aura-color: #ff00ff; }
  }
  .scene.revealed .aura {
    opacity: 0;
    transition: opacity 1s;
  }

  /* Flash overlay — full-screen white burst at reveal moment */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, white 0%, white 25%, rgba(255,255,255,0) 65%);
    opacity: 0;
    pointer-events: none;
    z-index: 90;
    transform: scale(.2);
  }
  .scene.flashing .flash-overlay {
    animation: flashBurst .9s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes flashBurst {
    0%   { opacity: 0; transform: scale(.15); }
    20%  { opacity: 1; transform: scale(2.2); }
    60%  { opacity: .6; transform: scale(3); }
    100% { opacity: 0; transform: scale(4); }
  }
  /* Shiny: rainbow flash, bigger + rotating */
  .scene.shiny-pull.flashing .flash-overlay {
    background: conic-gradient(from 0deg,
      rgba(255,0,255,1) 0deg, rgba(255,180,0,1) 60deg,
      rgba(255,255,0,1) 120deg, rgba(0,255,150,1) 180deg,
      rgba(0,200,255,1) 240deg, rgba(150,0,255,1) 300deg,
      rgba(255,0,255,1) 360deg);
    animation: flashBurstShiny 1.4s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes flashBurstShiny {
    0%   { opacity: 0; transform: scale(.15) rotate(0deg); }
    20%  { opacity: 1; transform: scale(3) rotate(180deg); }
    60%  { opacity: .7; transform: scale(4) rotate(360deg); }
    100% { opacity: 0; transform: scale(5) rotate(720deg); }
  }

  /* Shiny shockwave — expanding ring */
  .shockwave {
    position: fixed;
    left: 50%; top: 50%;
    width: 100px; height: 100px;
    transform: translate(-50%, -50%) scale(0);
    border: 14px solid rgba(255, 255, 255, .95);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 85;
    box-shadow: 0 0 80px white, 0 0 220px rgba(255, 0, 255, .85);
  }
  .scene.shiny-pull.flashing .shockwave {
    animation: shockwaveExpand 1.7s ease-out forwards;
  }
  @keyframes shockwaveExpand {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); border-width: 18px; }
    8%   { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(45); border-width: 2px; }
  }

  /* Shiny rotating light rays behind the card */
  .light-rays {
    position: absolute;
    left: 50%; top: 50%;
    width: 1400px; height: 1400px;
    transform: translate(-50%, -50%) translateY(-30px);
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,255,180,.55) 3deg, transparent 7deg,
      transparent 27deg, rgba(255,180,255,.55) 30deg, transparent 34deg,
      transparent 57deg, rgba(180,255,255,.55) 60deg, transparent 64deg,
      transparent 87deg, rgba(255,255,180,.55) 90deg, transparent 94deg,
      transparent 117deg, rgba(255,180,255,.55) 120deg, transparent 124deg,
      transparent 147deg, rgba(180,255,255,.55) 150deg, transparent 154deg,
      transparent 177deg, rgba(255,255,180,.55) 180deg, transparent 184deg);
    pointer-events: none;
    opacity: 0;
    z-index: -2;
    mix-blend-mode: screen;
    filter: blur(2px);
  }
  .scene.shiny-pull.revealed .light-rays {
    opacity: .9;
    animation: lightRayRotate 6s linear infinite;
  }
  @keyframes lightRayRotate {
    0%   { transform: translate(-50%, -50%) translateY(-30px) rotate(0deg); }
    100% { transform: translate(-50%, -50%) translateY(-30px) rotate(360deg); }
  }

  /* Shiny tag — sits BELOW the card, modern minimal style with cycling rainbow border */
  .shiny-banner {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(0px + 310px)) scale(.7);
    background: rgba(8, 8, 18, .92);
    color: #fff;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 10px;
    text-indent: 10px;                   /* visually balance the trailing letter-spacing */
    padding: 9px 22px 9px 32px;
    border-radius: 100px;
    border: 2px solid #ff00ff;
    box-shadow: 0 0 18px #ff00ff, 0 0 48px rgba(255, 0, 255, .35), 0 8px 22px rgba(0,0,0,.55);
    text-shadow: 0 0 10px rgba(255,255,255,.6);
    white-space: nowrap;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
  }
  .scene.shiny-pull.revealed .shiny-banner {
    opacity: 1;
    animation:
      shinyTagRise .6s cubic-bezier(.34, 1.56, .64, 1) .25s forwards,
      shinyBorderCycle 2.8s linear .25s infinite;
  }
  @keyframes shinyTagRise {
    0%   { transform: translate(-50%, 340px) scale(.55); opacity: 0; }
    100% { transform: translate(-50%, 290px) scale(1);   opacity: 1; }
  }
  @keyframes shinyBorderCycle {
    0%, 100% { border-color: #ff00ff; box-shadow: 0 0 18px #ff00ff, 0 0 48px rgba(255, 0, 255, .35), 0 8px 22px rgba(0,0,0,.55); }
    33%      { border-color: #00ddff; box-shadow: 0 0 18px #00ddff, 0 0 48px rgba(0, 221, 255, .35), 0 8px 22px rgba(0,0,0,.55); }
    66%      { border-color: #ffaa00; box-shadow: 0 0 18px #ffaa00, 0 0 48px rgba(255, 170, 0, .35), 0 8px 22px rgba(0,0,0,.55); }
  }

  /* ============================================================
     LEGENDARY-tier effects (scene-level)
     ============================================================ */

  /* Legendary aura — gold pulse, stronger than shiny/regular */
  .scene.legendary-pull .aura {
    animation: legendaryAuraPulse 1.3s ease-in-out infinite !important;
  }
  .scene.legendary-pull.vibrating .aura {
    animation: legendaryAuraPulse .2s ease-in-out infinite !important;
  }
  @keyframes legendaryAuraPulse {
    0%, 100% {
      box-shadow:
        0 0 80px 25px #ffd700,
        0 0 180px 60px rgba(255, 200, 40, .8);
      filter: brightness(1.2);
    }
    50% {
      box-shadow:
        0 0 140px 50px #fff6a0,
        0 0 280px 110px rgba(255, 230, 100, 1);
      filter: brightness(1.9);
    }
  }

  /* Screen-darken — heavy dim during the build-up to maximise the gold-flash pop,
     then drops away so the reveal & settled phases look clean over your stream. */
  .screen-darken {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center,
      transparent 0%,
      rgba(0, 0, 0, .35) 45%,
      rgba(0, 0, 0, .85) 100%);
    opacity: 0;
    pointer-events: none;
    z-index: 80;
    transition: opacity .9s ease-in-out;
  }
  /* Build-up: heavy dark so the imminent flash will pop hard */
  .scene.legendary-pull.vibrating .screen-darken { opacity: .9; }
  .scene.legendary-pull.flashing  .screen-darken {
    opacity: .9;
    transition: opacity .6s ease-out;   /* faster fade-out once card is revealing */
  }
  /* Reveal & settled: clean — card is doing the work, no more dim */
  .scene.legendary-pull.revealed  .screen-darken { opacity: .12; }
  .scene.legendary-pull.settled   .screen-darken { opacity: 0; }

  /* Legendary flash — gold radial burst replacing the white/rainbow */
  .scene.legendary-pull.flashing .flash-overlay {
    background: radial-gradient(circle at center,
      #fff6c8 0%, #ffd700 25%, rgba(255, 200, 40, .4) 55%, rgba(255, 200, 40, 0) 75%);
    animation: flashBurstLegendary 1.3s cubic-bezier(.2, .8, .4, 1) forwards !important;
  }
  @keyframes flashBurstLegendary {
    0%   { opacity: 0; transform: scale(.15); }
    20%  { opacity: 1; transform: scale(2.5); }
    60%  { opacity: .65; transform: scale(3.5); }
    100% { opacity: 0; transform: scale(4.5); }
  }

  /* Legendary shockwaves — DOUBLE ring (the second one starts later) */
  .scene.legendary-pull.flashing .shockwave {
    border-color: rgba(255, 215, 0, .95);
    box-shadow: 0 0 100px #ffd700, 0 0 240px rgba(255, 200, 40, .9);
    animation: shockwaveExpandLegendary 1.9s ease-out forwards !important;
  }
  @keyframes shockwaveExpandLegendary {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); border-width: 20px; }
    6%   { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(50); border-width: 2px; }
  }
  /* Second ring fired a moment later (uses the legendary-banner element which we hide visually with display:contents for ringer behaviour) */
  .scene.legendary-pull .shockwave-2 {
    position: fixed;
    left: 50%; top: 50%;
    width: 100px; height: 100px;
    transform: translate(-50%, -50%) scale(0);
    border: 14px solid rgba(255, 245, 200, .9);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 84;
    box-shadow: 0 0 80px #fff6a0, 0 0 200px rgba(255, 220, 80, .85);
  }
  .scene.legendary-pull.flashing .shockwave-2 {
    animation: shockwaveExpandLegendary 2.2s ease-out .25s forwards;
  }

  /* Legendary light rays — gold, slower rotation, wider */
  .scene.legendary-pull .light-rays {
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(255,240,160,.7) 6deg, transparent 12deg,
      transparent 42deg, rgba(255,210,80,.7) 48deg, transparent 54deg,
      transparent 84deg, rgba(255,250,200,.7) 90deg, transparent 96deg,
      transparent 126deg, rgba(255,220,120,.7) 132deg, transparent 138deg,
      transparent 168deg, rgba(255,240,160,.7) 174deg, transparent 180deg);
  }
  .scene.legendary-pull.revealed .light-rays {
    opacity: 1;
    animation: lightRayRotate 10s linear infinite;
  }

  /* "⚜ LEGENDARY" tag — gold pill below the card */
  .legendary-banner {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(0px + 320px)) scale(.7);
    background: linear-gradient(180deg, #fff7c8 0%, #f0c020 60%, #b8860b 100%);
    color: #3a2400;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 10px;
    text-indent: 10px;
    padding: 9px 24px 9px 34px;
    border-radius: 100px;
    border: 2px solid #fff6b8;
    box-shadow:
      0 0 25px #ffd700,
      0 0 60px rgba(255, 200, 40, .6),
      0 8px 22px rgba(0,0,0,.55),
      0 0 0 3px rgba(184, 134, 11, .8);
    text-shadow: 0 1px 0 rgba(255,255,255,.5);
    white-space: nowrap;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
  }
  .scene.legendary-pull.revealed .legendary-banner {
    opacity: 1;
    animation:
      legendaryTagRise .7s cubic-bezier(.34, 1.56, .64, 1) .3s forwards,
      legendaryTagGlow 2.4s ease-in-out 1s infinite;
  }
  @keyframes legendaryTagRise {
    0%   { transform: translate(-50%, 380px) scale(.5); opacity: 0; }
    100% { transform: translate(-50%, 300px) scale(1);  opacity: 1; }
  }
  @keyframes legendaryTagGlow {
    0%, 100% { filter: brightness(1)   drop-shadow(0 0 10px rgba(255,215,0,.6)); }
    50%      { filter: brightness(1.2) drop-shadow(0 0 22px rgba(255,235,120,.9)); }
  }

  /* Completion celebration (full-screen takeover) */
  #complete-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,.85) 0%, rgba(0,0,0,.95) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ffcb05;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .8s;
    z-index: 100;
  }
  #complete-overlay.show { opacity: 1; }
  #complete-overlay .big {
    font-size: 96px;
    font-family: 'Impact', sans-serif;
    letter-spacing: 4px;
    text-shadow:
      -4px -4px 0 #2a3b8f, 4px -4px 0 #2a3b8f,
      -4px 4px 0 #2a3b8f, 4px 4px 0 #2a3b8f,
      0 10px 40px rgba(255,203,5,.8);
    animation: bigPulse 1.2s ease-in-out infinite;
  }
  @keyframes bigPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
  #complete-overlay .sub {
    font-size: 32px;
    color: #fff;
    margin-top: 24px;
    text-shadow: 2px 2px 0 #2a3b8f;
  }
  #complete-overlay .who { color: #ffcb05; font-weight: 900; }

  /* ---------- Hard-coded credit (subtle bottom-right) ---------- */
  #overlay-credit {
    position: fixed;
    bottom: 10px;
    right: 14px;
    color: rgba(255, 255, 255, .35);
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-shadow:
      0 1px 2px rgba(0, 0, 0, .8),
      0 0 4px rgba(0, 0, 0, .6);
    pointer-events: none;
    user-select: none;
    z-index: 5;
    white-space: nowrap;
  }

  /* ---------- Debug panel (only with ?debug=1) ---------- */
  #debug {
    position: fixed;
    bottom: 12px;
    left: 12px;
    background: rgba(0,0,0,.8);
    color: #0f0;
    font-family: monospace;
    font-size: 12px;
    padding: 10px;
    border-radius: 6px;
    max-width: 380px;
    z-index: 200;
    pointer-events: auto;
    display: none;
  }
  #debug.on { display: block; }
  #debug button {
    background: #ffcb05;
    color: #2a3b8f;
    border: none;
    padding: 6px 10px;
    margin: 2px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    font-size: 11px;
  }
  #debug input {
    background: #111;
    color: #0f0;
    border: 1px solid #333;
    padding: 4px;
    font-family: monospace;
    width: 120px;
  }
  #debug .row { margin: 4px 0; }
  #debug .status { color: #0ff; }
</style>
</head>
<body>

<div id="banner"></div>

<div id="stage"></div>

<div id="overlay-credit">kick.com/amateurgamer</div>

<div id="complete-overlay">
  <div class="big">GOTTA CATCH 'EM ALL!</div>
  <div class="sub"><span class="who" id="complete-who"></span> just completed the Kanto Pokédex!</div>
  <div class="sub" style="font-size:24px; margin-top:40px;">🏆 First completer wins the prize 🏆</div>
</div>

<div id="debug">
  <div class="row status" id="status">connecting…</div>
  <div class="row">
    <input id="dbg-user" placeholder="username" value="testviewer">
    <input id="dbg-count" placeholder="qty" value="1" type="number" min="1" max="50" style="width:50px">
  </div>
  <div class="row">
    <button onclick="debugTrigger()">Fire gift event</button>
    <button onclick="debugShiny()">Force shiny next</button>
    <button onclick="debugReset()">Wipe local dex</button>
  </div>
  <div class="row">
    <button onclick="debugLegendary()">⚜ Force legendary</button>
    <button onclick="debugShinyLegendary()">✦⚜ Shiny legendary</button>
  </div>
  <div class="row">
    <button onclick="debugSetCount(149)">Test: 149 caught</button>
    <button onclick="debugCompletion()">Test: completion FX</button>
  </div>
  <div class="row">
    <button onclick="debugWildSpawn()">🌿 Force wild spawn now</button>
  </div>
  <div class="row">
    <button onclick="debugWipeAll()" style="background:#a02020;color:#fff;">⚠ WIPE ALL viewer data</button>
  </div>
</div>

<script src="cards.js"></script>
<script src="config.js"></script>
<script>
/* ============================================================
   CONFIG & STATE
   ============================================================ */
const Q = new URLSearchParams(location.search);
const cfg = Object.assign({
  // Streamer.bot WebSocket (defaults match Streamer.bot's defaults)
  streamerbotHost: '127.0.0.1',
  streamerbotPort: 8080,
  streamerbotEndpoint: '/',
  streamerbotPassword: '',

  // Event matching — set the Streamer.bot Custom Event name you'll fire from
  // your "Kick Gift Subscription" action. Default: 'pokepack'.
  customEventName: 'pokepack',

  // Also auto-listen to native Kick events if they come through:
  listenNativeKickGifts: true,

  // Shiny odds: 1 in N (independent of which Pokemon is picked)
  shinyOdds: 100,

  // Legendary rarity weight (relative to regular cards = 1.0)
  // 0.1 = legendaries are 10× less likely on any given pull.
  // Lower = rarer chase. 0.05 = 20× rarer, 0.02 = 50× rarer.
  // No-dupes means viewers WILL still get all 5 eventually — they just
  // become rarer mid-collection.
  legendaryWeight: 0.1,

  // Firebase Realtime Database REST URL (e.g. https://your-project.firebaseio.com)
  // Leave blank to run with localStorage only (no public Pokedex).
  firebaseUrl: '',

  // Pack economy: every N gifted subs earns the viewer one pack.
  // Carry-over: a viewer who gifts 1 today and 1 tomorrow earns a pack tomorrow.
  giftsPerPack: 2,
  cardsPerPack: 1,

  // Total animation length per card (ms)
  animMs: 10000,
  // How long card lingers after the 10s reveal (ms)
  lingerMs: 4000,

  // Optional custom card-back image URL (leave blank to use CSS recreation)
  cardBackImageUrl: '',

  // ---- Sound effects ----
  soundsEnabled: true,
  soundVolume: 0.5,                              // 0.0 - 1.0 master volume
  legendaryFanfareUrl: 'legendary-fanfare.mp3',  // relative to overlay.html
  // OBS browser sources can buffer audio slightly behind visuals. The pre-warm
  // on overlay load usually handles cold-start lag. If audio still feels late
  // in OBS after warmup, bump this to 100-200 to fire SFX earlier than visual.
  audioOffsetMs: 0,
}, window.STREAM_CONFIG || {});

// URL overrides (e.g. ?shinyOdds=20 for testing)
for (const k of Object.keys(cfg)) {
  if (Q.has(k)) {
    const v = Q.get(k);
    cfg[k] = (typeof cfg[k] === 'number') ? Number(v) : v;
  }
}

const DEBUG = Q.has('debug');
if (DEBUG) document.getElementById('debug').classList.add('on');
const dbgStatus = (s) => { const el = document.getElementById('status'); if (el) el.textContent = s; };

/* ============================================================
   SOUND EFFECTS
   - Pack tear, regular reveal, shiny reveal: procedural (Web Audio API)
   - Legendary reveal: hosted MP3 (cfg.legendaryFanfareUrl)
   - Disable all via cfg.soundsEnabled = false  OR  ?mute=1 in URL
   ============================================================ */
const Sfx = {
  _ctx: null,
  _legendaryAudio: null,

  init() {
    // Pre-warm the AudioContext so the first procedural sound isn't laggy
    try { this._getCtx(); } catch (e) {}
    if (cfg.legendaryFanfareUrl) {
      try {
        this._legendaryAudio = new Audio(cfg.legendaryFanfareUrl);
        this._legendaryAudio.preload = 'auto';
        this._legendaryAudio.volume = cfg.soundVolume;
        // Force the browser to start fetching the audio data immediately
        this._legendaryAudio.load();
      } catch (e) { console.warn('Legendary fanfare load failed:', e); }
    }
  },
  enabled() {
    return cfg.soundsEnabled !== false && !Q.has('mute');
  },
  _getCtx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  },
  _noise(c, durationSec = 1) {
    const buf = c.createBuffer(1, c.sampleRate * durationSec, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  },

  // -------- Pack tear --------
  packTear() {
    if (!this.enabled()) return;
    const c = this._getCtx();
    const t = c.currentTime;
    const master = c.createGain();
    master.gain.value = 0.55 * cfg.soundVolume;
    master.connect(c.destination);

    // initial sharp rip
    const rip = c.createBufferSource();
    rip.buffer = this._noise(c, 0.12);
    const rf = c.createBiquadFilter();
    rf.type = 'highpass'; rf.frequency.value = 4000; rf.Q.value = 2;
    const rg = c.createGain();
    rg.gain.setValueAtTime(0, t);
    rg.gain.linearRampToValueAtTime(0.55, t + 0.005);
    rg.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    rip.connect(rf).connect(rg).connect(master);
    rip.start(t); rip.stop(t + 0.12);

    // crinkle ticks
    for (let i = 0; i < 5; i++) {
      const offset = 0.05 + i * (0.09 + Math.random() * 0.04);
      const crk = c.createBufferSource();
      crk.buffer = this._noise(c, 0.06);
      const cf = c.createBiquadFilter();
      cf.type = 'bandpass';
      cf.frequency.value = 2500 - i * 250 + (Math.random() - .5) * 400;
      cf.Q.value = 5;
      const cg = c.createGain();
      cg.gain.setValueAtTime(0, t + offset);
      cg.gain.linearRampToValueAtTime(0.35 + Math.random() * 0.15, t + offset + 0.003);
      cg.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.05);
      crk.connect(cf).connect(cg).connect(master);
      crk.start(t + offset); crk.stop(t + offset + 0.06);
    }

    // FWIP sweep + sub-thump
    const fwip = c.createBufferSource();
    fwip.buffer = this._noise(c, 0.3);
    const ff = c.createBiquadFilter();
    ff.type = 'lowpass'; ff.Q.value = 4;
    ff.frequency.setValueAtTime(1800, t + 0.55);
    ff.frequency.exponentialRampToValueAtTime(200, t + 0.85);
    const fg = c.createGain();
    fg.gain.setValueAtTime(0, t + 0.55);
    fg.gain.linearRampToValueAtTime(0.6, t + 0.58);
    fg.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    fwip.connect(ff).connect(fg).connect(master);
    fwip.start(t + 0.55); fwip.stop(t + 0.9);

    const thump = c.createOscillator();
    thump.type = 'sine';
    thump.frequency.setValueAtTime(140, t + 0.6);
    thump.frequency.exponentialRampToValueAtTime(50, t + 0.85);
    const tg = c.createGain();
    tg.gain.setValueAtTime(0, t + 0.6);
    tg.gain.linearRampToValueAtTime(0.5, t + 0.62);
    tg.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    thump.connect(tg).connect(master);
    thump.start(t + 0.6); thump.stop(t + 0.9);
  },

  // -------- Regular card reveal --------
  regularReveal() {
    if (!this.enabled()) return;
    const c = this._getCtx();
    const t = c.currentTime;
    const master = c.createGain();
    master.gain.value = 0.45 * cfg.soundVolume;
    master.connect(c.destination);

    // delay-based reverb tail
    const delay = c.createDelay();
    delay.delayTime.value = 0.18;
    const feedback = c.createGain();
    feedback.gain.value = 0.35;
    const wet = c.createGain();
    wet.gain.value = 0.4;
    delay.connect(feedback).connect(delay);
    delay.connect(wet).connect(master);

    // whoosh
    const wh = c.createBufferSource();
    wh.buffer = this._noise(c, 0.4);
    const whf = c.createBiquadFilter();
    whf.type = 'bandpass'; whf.Q.value = 2.5;
    whf.frequency.setValueAtTime(400, t);
    whf.frequency.exponentialRampToValueAtTime(3200, t + 0.25);
    const whg = c.createGain();
    whg.gain.setValueAtTime(0, t);
    whg.gain.linearRampToValueAtTime(0.25, t + 0.12);
    whg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    wh.connect(whf).connect(whg).connect(master);
    wh.start(t); wh.stop(t + 0.4);

    // FM bell, two voices
    const bellAt = t + 0.22;
    [880, 1318.5].forEach((fund, i) => {
      const carrier = c.createOscillator();
      carrier.type = 'sine'; carrier.frequency.value = fund;
      const mod = c.createOscillator();
      mod.type = 'sine'; mod.frequency.value = fund * 3;
      const mg = c.createGain();
      mg.gain.setValueAtTime(fund * 4, bellAt);
      mg.gain.exponentialRampToValueAtTime(fund * 0.3, bellAt + 0.8);
      mod.connect(mg).connect(carrier.frequency);
      const g = c.createGain();
      g.gain.setValueAtTime(0, bellAt);
      g.gain.linearRampToValueAtTime(i === 0 ? 0.38 : 0.18, bellAt + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, bellAt + 1.2);
      carrier.connect(g);
      g.connect(master); g.connect(delay);
      mod.start(bellAt); mod.stop(bellAt + 1.3);
      carrier.start(bellAt); carrier.stop(bellAt + 1.3);
    });

    // sparkle layer
    for (let i = 0; i < 3; i++) {
      const dT = 0.3 + i * 0.12 + Math.random() * 0.05;
      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 3500 + Math.random() * 2500;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t + dT);
      g.gain.linearRampToValueAtTime(0.16, t + dT + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dT + 0.25);
      osc.connect(g).connect(master);
      osc.start(t + dT); osc.stop(t + dT + 0.3);
    }
  },

  // -------- Shiny reveal --------
  shinyReveal() {
    if (!this.enabled()) return;
    const c = this._getCtx();
    const t = c.currentTime;
    const master = c.createGain();
    master.gain.value = 0.4 * cfg.soundVolume;
    master.connect(c.destination);

    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
    notes.forEach((freq, i) => {
      const delay = i * 0.09;
      [1, 2.756].forEach((mult, j) => {
        const osc = c.createOscillator();
        osc.type = 'sine'; osc.frequency.value = freq * mult;
        const g = c.createGain();
        g.gain.setValueAtTime(0, t + delay);
        g.gain.linearRampToValueAtTime(j === 0 ? 0.45 : 0.18, t + delay + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + delay + 0.8);
        osc.connect(g).connect(master);
        osc.start(t + delay); osc.stop(t + delay + 0.85);
      });
    });

    for (let i = 0; i < 8; i++) {
      const dT = 0.1 + Math.random() * 1.1;
      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 2500 + Math.random() * 2500;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t + dT);
      g.gain.linearRampToValueAtTime(0.18, t + dT + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dT + 0.2);
      osc.connect(g).connect(master);
      osc.start(t + dT); osc.stop(t + dT + 0.25);
    }
  },

  // -------- Legendary reveal (hosted MP3) --------
  legendaryReveal() {
    if (!this.enabled() || !this._legendaryAudio) return;
    try {
      this._legendaryAudio.currentTime = 0;
      this._legendaryAudio.volume = cfg.soundVolume;
      const p = this._legendaryAudio.play();
      if (p && p.catch) p.catch(e => console.warn('Legendary audio play blocked:', e));
    } catch (e) { console.warn('Legendary audio play failed:', e); }
  },

  // Dispatch the right reveal sound based on card rarity
  reveal(card) {
    if (card.legendary) this.legendaryReveal();
    else if (card.shiny) this.shinyReveal();
    else this.regularReveal();
  },
};
Sfx.init();

/* ============================================================
   USER KEY NORMALISATION
   Kick treats usernames as case-insensitive (`AmateurGamer` and
   `amateurgamer` are the same account). We use the lowercased
   form as the Firebase key everywhere, and stash the original
   casing inside `/collections/<key>/_meta/displayName` so the
   dex can render pretty case on screen.
   ============================================================ */
function userKey(name) {
  return String(name || '').trim().toLowerCase() || 'anonymous';
}

/* ============================================================
   STORAGE — Firebase REST (optional) + localStorage fallback
   ============================================================ */
const Store = {
  async getCollection(user) {
    const k = userKey(user);
    const local = JSON.parse(localStorage.getItem(`dex:${k}`) || '{}');
    if (!cfg.firebaseUrl) return local;
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/collections/${encodeURIComponent(k)}.json`);
      const remote = await r.json();
      const merged = Object.assign({}, local, remote || {});
      localStorage.setItem(`dex:${k}`, JSON.stringify(merged));
      return merged;
    } catch (e) {
      console.warn('Firebase read failed, using local:', e);
      return local;
    }
  },
  async savePull(user, card) {
    const k = userKey(user);
    const local = JSON.parse(localStorage.getItem(`dex:${k}`) || '{}');
    const slotKey = `${card.id}${card.shiny ? '_shiny' : ''}`;
    local[slotKey] = { id: card.id, shiny: card.shiny, name: card.name, at: Date.now() };
    localStorage.setItem(`dex:${k}`, JSON.stringify(local));
    if (!cfg.firebaseUrl) return;
    try {
      // PATCH the root with {_meta + new slot} so display name and pull land in one round-trip
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/collections/${encodeURIComponent(k)}.json`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [slotKey]: local[slotKey], _meta: { displayName: String(user || '').trim() || k } }),
      });
    } catch (e) {
      console.warn('Firebase write failed:', e);
    }
  },
  async getCredits(user) {
    const k = userKey(user);
    const local = parseInt(localStorage.getItem(`credits:${k}`) || '0') || 0;
    if (!cfg.firebaseUrl) return local;
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/credits/${encodeURIComponent(k)}.json`);
      const remote = await r.json();
      const v = typeof remote === 'number' ? remote : local;
      localStorage.setItem(`credits:${k}`, String(v));
      return v;
    } catch (e) {
      return local;
    }
  },
  async setCredits(user, n) {
    const k = userKey(user);
    localStorage.setItem(`credits:${k}`, String(n));
    if (!cfg.firebaseUrl) return;
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/credits/${encodeURIComponent(k)}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(n),
      });
    } catch (e) { console.warn('credit write failed:', e); }
  },
  async markCompleter(user) {
    const k = userKey(user);
    const display = String(user || '').trim() || k;
    const local = JSON.parse(localStorage.getItem('completers') || '[]');
    if (!local.find(x => userKey(x.user) === k)) {
      local.push({ user: display, at: Date.now() });
      localStorage.setItem('completers', JSON.stringify(local));
    }
    if (!cfg.firebaseUrl) return;
    try {
      await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/completers/${encodeURIComponent(k)}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: display, at: Date.now() }),
      });
    } catch (e) { console.warn(e); }
  },
  async wipeAll() {
    // Hard reset — used after the case-sensitivity migration. Confirm at the
    // call site since this is destructive.
    localStorage.removeItem('completers');
    for (const k of Object.keys(localStorage)) {
      if (k.startsWith('dex:') || k.startsWith('credits:')) localStorage.removeItem(k);
    }
    if (!cfg.firebaseUrl) return;
    const base = cfg.firebaseUrl.replace(/\/$/,'');
    await Promise.all([
      fetch(`${base}/collections.json`, { method: 'DELETE' }),
      fetch(`${base}/credits.json`, { method: 'DELETE' }),
      fetch(`${base}/completers.json`, { method: 'DELETE' }),
    ]);
  },
};

/* ============================================================
   CARD SELECTION — no duplicates per viewer
   ============================================================ */
function pickCardFor(collection, forceShiny = false, forceLegendary = false) {
  // Dual-dex system: each Pokemon has TWO slots (standard + shiny).
  // Ownership is tracked by (id, variant) pairs — viewers can collect both
  // variants of the same Pokemon. 302 total slots, prize at 151 unique.
  const ownedSlots = new Set();
  for (const k of Object.keys(collection)) {
    const v = collection[k];
    if (v && typeof v.id === 'number') {
      ownedSlots.add(`${v.id}_${v.shiny ? 'shiny' : 'std'}`);
    }
  }

  // Roll variant first (1/shinyOdds), then pick from that variant's pool
  let shiny = forceShiny || (Math.random() < (1 / cfg.shinyOdds));

  const poolFor = (isShiny) => {
    let cards = KANTO_CARDS.filter(c =>
      !ownedSlots.has(`${c.id}_${isShiny ? 'shiny' : 'std'}`)
    );
    if (forceLegendary) {
      const leg = cards.filter(c => c.legendary);
      if (leg.length > 0) cards = leg;
    }
    return cards;
  };

  let pool = poolFor(shiny);
  // If chosen variant is exhausted, fall back to the other
  if (pool.length === 0) {
    shiny = !shiny;
    pool = poolFor(shiny);
  }
  // Both variants exhausted = 302/302 absolute completion
  if (pool.length === 0) return null;

  // Weighted random within the variant pool (legendary = rare)
  const weights = pool.map(c => c.legendary ? (cfg.legendaryWeight || 0.1) : 1);
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  let card = pool[pool.length - 1];
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) { card = pool[i]; break; }
  }
  return { ...card, shiny };
}

let FORCE_NEXT_SHINY = false;
let FORCE_NEXT_LEGENDARY = false;

  // avoid hosting copyrighted artwork).
  const backImg = cfg.cardBackImageUrl || '';

  const scene = document.createElement('div');
  scene.className = 'scene';
  scene.innerHTML = `
    <!-- effects layered behind the card -->
    <div class="light-rays"></div>
    <div class="aura" style="--aura-color: ${auraColor};"></div>

    <div class="pack">
      <div class="pack-top">
        <div class="pack-foil"></div>
        <div class="pack-stripe top"></div>
      </div>

        <div class="pack-stripe bot"></div>

    <div class="card">
      <div class="card-face card-back${backImg ? ' has-image' : ''}">
        ${backImg ? `<img class="back-image" src="${backImg}" alt="card back">` : `
          <div class="logo-top">POKéMON</div>
          <div class="pokeball-back"></div>
          <div class="logo-bot">POKéMON</div>
        `}
      </div>
      <div class="card-face card-front ${card.shiny ? 'shiny' : ''} ${card.legendary ? 'legendary' : ''}"
           style="--type-bg:${tc.bg}; --type-border:${tc.border}; --type-text:${tc.text};">
        <div class="header">
          <div class="name">${card.name}</div>
          <div class="hp">HP<span class="num">${card.hp}</span></div>
        </div>
        <div class="art" style="background: linear-gradient(180deg, ${tc.bg}55 0%, ${tc.bg}cc 100%);">
          <div class="type-badge">${card.type.slice(0,3)}</div>
          <img src="${artUrl}" alt="${card.name}" loading="eager">
        </div>
        <div class="footer">
          <span class="dex">No. ${String(card.id).padStart(3,'0')} / 151 — Kanto</span>
          <span class="rarity">
            ${card.legendary
              ? '<span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>'
              : card.shiny
                ? '<span class="star">★</span><span class="star">★</span><span class="star">★</span>'
                : '<span class="star">★</span>'}
          </span>
        </div>
      </div>
      <div class="sparkles"></div>
      <div class="new-badge">NEW!</div>
    </div>

    <div class="shockwave-2"></div>
    <div class="screen-darken"></div>
    <div class="flash-overlay"></div>
  `;

  // Generate explosion sparks — random radial directions from the rip line
  const burstEl = scene.querySelector('.pack-burst');
  if (burstEl) {
    const sparkCount = card.shiny ? 36 : 26;
    for (let i = 0; i < sparkCount; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const angle = (Math.PI * (i / sparkCount)) - (Math.PI * .15) + (Math.random() - .5) * .25;
      // Upward arc — angles biased upward (0 = right, -PI/2 = up)
      const upAngle = -Math.PI / 2 + (Math.random() - .5) * Math.PI * 1.2;
