<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Kanto Pokédex — amateurgamer</title>
<style>
  :root {
    --gold: #ffcb05;
    --navy: #2a3b8f;
    --navy-dark: #1a2966;
    --red: #ee1515;
    --bg: #0f1428;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,203,5,.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(42,59,143,.4) 0%, transparent 50%),
      var(--bg);
    color: #fff;
    font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(180deg, var(--red) 0%, #a50f0f 100%);
    padding: 16px 20px;
    border-bottom: 4px solid var(--gold);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  header .wrap {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    color: var(--gold);
    font-family: 'Impact', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    text-shadow:
      -2px -2px 0 var(--navy), 2px -2px 0 var(--navy),
      -2px 2px 0 var(--navy), 2px 2px 0 var(--navy),
      0 6px 0 var(--navy-dark);
  }
  header .who {
    color: #fff;
    font-size: 18px;
    background: rgba(0,0,0,.3);
    padding: 8px 16px;
    border-radius: 8px;
    border: 2px solid var(--gold);
  }
  header .who strong { color: var(--gold); }
  header .controls {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  header input {
    background: rgba(0,0,0,.4);
    border: 2px solid var(--gold);
    border-radius: 6px;
    color: #fff;
    padding: 8px 12px;
    font-size: 14px;
    width: 200px;
  }
  header button {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }
  header button:hover { background: #f6a800; }

  main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* ===== Progress bar ===== */
  .progress {
    background: rgba(0,0,0,.3);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
  }
  .progress .row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .progress .count {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    font-family: 'Impact', sans-serif;
  }
  .progress .count .total { color: rgba(255,255,255,.5); font-size: 22px; }
  .progress .bar {
    flex: 1;
    height: 18px;
    background: rgba(0,0,0,.4);
    border-radius: 9px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.1);
    min-width: 240px;
  }
  .progress .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red) 0%, var(--gold) 100%);
    width: 0%;
    transition: width 1.2s ease-out;
    box-shadow: 0 0 12px var(--gold);
  }
  .progress .pct {
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    min-width: 60px;
    text-align: right;
  }
  .progress .stats {
    margin-top: 12px;
    display: flex;
    gap: 20px;
    font-size: 14px;
    color: rgba(255,255,255,.8);
    flex-wrap: wrap;
  }
  .progress .stats .shiny-count { color: #ff66ff; font-weight: bold; }

  /* ===== Card grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .slot {
    background: rgba(0,0,0,.3);
    border: 2px solid rgba(255,255,255,.1);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
    position: relative;
    transition: transform .15s, border-color .2s;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .slot:hover { transform: translateY(-2px); }
  .slot.owned {
    background: linear-gradient(180deg, rgba(255,203,5,.15) 0%, rgba(42,59,143,.3) 100%);
    border-color: var(--gold);
  }
  .slot.shiny {
    border-color: #ff66ff;
    background:
      conic-gradient(from 0deg, rgba(255,0,255,.15), rgba(255,150,0,.15), rgba(255,255,0,.15), rgba(0,255,150,.15), rgba(0,200,255,.15), rgba(255,0,255,.15));
    animation: shinyRot 8s linear infinite;
  }
  @keyframes shinyRot { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
  .slot .num {
    font-size: 11px;
    color: rgba(255,255,255,.5);
    font-weight: bold;
  }
  .slot.owned .num { color: var(--gold); }
  .slot .art {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 4px 0;
  }
  .slot img {
    max-width: 100%;
    max-height: 100%;
    image-rendering: auto;
    transition: filter .3s;
  }
  .slot:not(.owned) img {
    filter: brightness(0) invert(.2);
    opacity: .5;
  }
  .slot .name {
    font-size: 12px;
    font-weight: bold;
    color: #fff;
    line-height: 1.2;
  }
  .slot:not(.owned) .name {
    color: rgba(255,255,255,.3);
  }
  .slot .shiny-tag {
    position: absolute;
    top: 4px; right: 4px;
    background: linear-gradient(135deg, #ff00ff, #ffaa00);
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 8px;
    box-shadow: 0 0 6px rgba(255,0,255,.6);
  }

  /* ===== Filter tabs ===== */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter {
    background: rgba(0,0,0,.3);
    color: #fff;
    border: 2px solid rgba(255,255,255,.15);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: bold;
  }
  .filter.active {
    background: var(--gold);
    color: var(--navy);
    border-color: var(--gold);
  }

  /* ===== Completers / Hall of Fame ===== */
  .hof {
    margin-top: 40px;
    background: linear-gradient(180deg, rgba(255,203,5,.1) 0%, rgba(42,59,143,.2) 100%);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 20px;
  }
  .hof h2 {
    margin: 0 0 12px 0;
    color: var(--gold);
    font-family: 'Impact', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
  }
  .hof ol { padding-left: 20px; margin: 0; }
  .hof li {
    padding: 6px 0;
    color: #fff;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,.05);
  }
  .hof li:last-child { border-bottom: none; }
  .hof li .user { color: var(--gold); font-weight: bold; }
  .hof li .date { color: rgba(255,255,255,.5); font-size: 13px; margin-left: 10px; }
  .hof .empty { color: rgba(255,255,255,.5); font-style: italic; }

  /* ===== Empty state ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,.6);
  }
  .empty-state h2 { color: var(--gold); }

  footer {
    text-align: center;
    padding: 30px 20px 60px;
    color: rgba(255,255,255,.4);
    font-size: 13px;
  }
  footer a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>KANTO PokéDEX</h1>
    <div class="who">Viewer: <strong id="who">…</strong></div>
    <div class="controls">
      <input id="user-input" placeholder="Enter Kick username">
      <button onclick="changeUser()">View</button>
    </div>
  </div>
</header>

<main>
  <div class="progress">
    <div class="row">
      <div class="count"><span id="owned-count">0</span><span class="total">/151</span></div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
    <div class="stats">
      <span>Standard: <strong id="std-count">0</strong></span>
      <span>Shiny: <strong class="shiny-count" id="shiny-count">0</strong> ✨</span>
      <span id="latest"></span>
    </div>
  </div>

  <div class="filters">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="owned">Caught</button>
    <button class="filter" data-filter="missing">Missing</button>
    <button class="filter" data-filter="shiny">Shinies</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="hof">
    <h2>🏆 Hall of Fame — Completed Pokédex</h2>
    <ol id="hof-list"><li class="empty">No one has completed it yet. Will you be first?</li></ol>
  </div>
</main>

<footer>
  Watching <a href="https://kick.com/amateurgamer" target="_blank">kick.com/amateurgamer</a> · Gift subs to pull cards
</footer>

<script src="cards.js"></script>
<script src="config.js"></script>
<script>
const Q = new URLSearchParams(location.search);
const cfg = Object.assign({ firebaseUrl: '' }, window.STREAM_CONFIG || {});

let currentUser = Q.get('viewer') || Q.get('user') || localStorage.getItem('lastViewer') || 'guest';
let currentFilter = 'all';
let collection = {};

document.getElementById('who').textContent = currentUser;
document.getElementById('user-input').value = currentUser;
localStorage.setItem('lastViewer', currentUser);

async function fetchCollection(user) {
  // Try firebase first, fall back to localStorage
  if (cfg.firebaseUrl) {
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/collections/${encodeURIComponent(user)}.json`);
      if (r.ok) {
        const data = await r.json();
        return data || {};
      }
    } catch (e) { console.warn('firebase read failed:', e); }
  }
  return JSON.parse(localStorage.getItem(`dex:${user}`) || '{}');
}

async function fetchCompleters() {
  if (cfg.firebaseUrl) {
    try {
      const r = await fetch(`${cfg.firebaseUrl.replace(/\/$/,'')}/completers.json`);
      if (r.ok) {
        const data = await r.json();
        if (data) return Object.values(data).sort((a, b) => a.at - b.at);
      }
    } catch (e) { console.warn('firebase completers read failed:', e); }
  }
  return JSON.parse(localStorage.getItem('completers') || '[]')
    .sort((a, b) => a.at - b.at);
}

function ownedIds(col) {
  const s = new Set();
  for (const k of Object.keys(col)) {
    const v = col[k];
    if (v && typeof v.id === 'number') s.add(v.id);
  }
  return s;
}

function shinyIds(col) {
  const s = new Set();
  for (const k of Object.keys(col)) {
    const v = col[k];
    if (v && v.shiny) s.add(v.id);
  }
  return s;
}

function latestPull(col) {
  let latest = null;
  for (const k of Object.keys(col)) {
    const v = col[k];
    if (v && v.at && (!latest || v.at > latest.at)) latest = v;
  }
  return latest;
}

function render() {
  const owned = ownedIds(collection);
  const shinies = shinyIds(collection);
  document.getElementById('owned-count').textContent = owned.size;
  document.getElementById('std-count').textContent = owned.size - shinies.size;
  document.getElementById('shiny-count').textContent = shinies.size;
  const pct = Math.round((owned.size / 151) * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('fill').style.width = pct + '%';
  const latest = latestPull(collection);
  document.getElementById('latest').textContent = latest
    ? `· Latest: ${latest.name}${latest.shiny ? ' ✨' : ''}`
    : '';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;
  for (const c of KANTO_CARDS) {
    const isOwned = owned.has(c.id);
    const isShiny = shinies.has(c.id);
    if (currentFilter === 'owned' && !isOwned) continue;
    if (currentFilter === 'missing' && isOwned) continue;
    if (currentFilter === 'shiny' && !isShiny) continue;
    visible++;
    const slot = document.createElement('div');
    slot.className = 'slot' + (isOwned ? ' owned' : '') + (isShiny ? ' shiny' : '');
    const sprites = cardSprites(c.id);
    const art = isShiny ? sprites.shiny : sprites.standard;
    slot.innerHTML = `
      <div class="num">#${String(c.id).padStart(3,'0')}</div>
      <div class="art"><img src="${art}" alt="${c.name}" loading="lazy"></div>
      <div class="name">${isOwned ? c.name : '???'}</div>
      ${isShiny ? '<div class="shiny-tag">SHINY</div>' : ''}
    `;
    grid.appendChild(slot);
  }
  if (visible === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h2>Nothing here yet</h2><p>Gift subs on stream to start your collection!</p></div>`;
  }
}

async function renderCompleters() {
  const list = await fetchCompleters();
  const el = document.getElementById('hof-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<li class="empty">No one has completed it yet. Will you be first?</li>';
    return;
  }
  el.innerHTML = list.map(c => `
    <li><span class="user">${escapeHtml(c.user)}</span><span class="date">${new Date(c.at).toLocaleDateString()}</span></li>
  `).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function load() {
  collection = await fetchCollection(currentUser);
  render();
  await renderCompleters();
}

function changeUser() {
  const v = document.getElementById('user-input').value.trim();
  if (!v) return;
  const url = new URL(location.href);
  url.searchParams.set('viewer', v);
  location.href = url.toString();
}

document.querySelectorAll('.filter').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentFilter = b.dataset.filter;
    render();
  });
});

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') changeUser();
});

load();
// Refresh every 15s so viewers see new pulls live without manual reload
setInterval(load, 15000);
</script>
</body>
</html>
